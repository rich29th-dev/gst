<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GST 121 Quiz • Ch.6 (Norms & Citizenship) + Ch.7 (Social Justice)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }
        .quiz-header h1 { font-size: 1.9rem; font-weight: 700; }
        .quiz-header p { margin-top: 5px; opacity: 0.9; }
        .progress-container { background: #e0e7d9; height: 8px; }
        .progress-fill { background: #f5b042; height: 8px; width: 0%; transition: width 0.25s; }
        .quiz-content { padding: 40px 35px; }
        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }
        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
        }
        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }
        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }
        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }
        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }
        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .feedback-correct {
            background: #e1f5e8;
            border-left: 6px solid #2b5e3b;
            color: #1f5a3a;
        }
        .feedback-wrong {
            background: #ffe6e5;
            border-left: 6px solid #b3413a;
            color: #9b2f28;
        }
        .disabled-card { cursor: default; opacity: 0.7; }
        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }
        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #2b5e3b;
        }
        .nav-btn.primary { background: #f5b042; color: #2d2b1a; }
        .nav-btn.primary:hover:not(:disabled) { background: #e09d2c; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }
        .result-panel.show { display: block; }
        .score-big { font-size: 2rem; font-weight: 800; color: #2b5e3b; }
        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }
        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
        }
        @media (max-width: 600px) {
            .quiz-content { padding: 28px 20px; }
            .question-text { font-size: 1.3rem; }
            .answer-card { padding: 12px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>📚 GST 121 · Chapters 6 & 7</h1>
        <p>Norms, Values, Citizenship · Social Justice, Purpose of the State</p>
        <p style="font-size:0.85rem;">30 questions • Randomised answer order • One per page</p>
    </div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on official GST 121 question bank – correct answers as provided</footer>
</div>

<script>
    // ---------- 30 QUESTIONS (exactly as supplied, with correct answers) ----------
    const BASE_QUESTIONS = [
        { text: "The main reason for the existence of the state is?", options: ["To collect tax from citizens", "To govern the people", "To form a territory", "To provide citizens with happiness and good life"], correct: "To provide citizens with happiness and good life" },
        { text: "The two types of Rights are _____ and _____?", options: ["Moral and Legal", "Political and Social", "Intellectual and Demonstrative", "Economic and Social"], correct: "Moral and Legal" },
        { text: "The foremost condition for adequate living according to P Laski is?", options: ["Security of property", "Security of life", "Provision of social infrastructure", "Provision of job opportunities"], correct: "Security of life" },
        { text: "Quid pro quo is a type of relationship between the state and citizens that can simply be interpreted as?", options: ["Parasitic", "Mutual", "Master/servant", "Symbiotic"], correct: "Mutual" },
        { text: "Rights of citizens of the society are protected by?", options: ["Cabinet members", "Police force", "Law", "Courts"], correct: "Law" },
        { text: "In Ancient Greece, in Athenian city, one of the groups recognized as citizens are?", options: ["The Proletariats", "The servants", "The Artisans", "Members of the ruling class"], correct: "Members of the ruling class" },
        { text: "One of these is a major condition for qualifying as a citizen of a state is?", options: ["By Birth", "By payment of tax", "By voting in an election", "Keeping the laws of the land"], correct: "By Birth" },
        { text: "Non-citizens in Athens were referred as?", options: ["Low birth", "High class", "Immigrants", "Emigrants"], correct: "Low birth" },
        { text: "The America Declaration of Independence took place in the year?", options: ["1776", "1788", "1730", "1755"], correct: "1776" },
        { text: "In Nigeria, the required period of time for an applicant to acquire citizenship is?", options: ["10 years", "15 years", "20 years", "5 years"], correct: "15 years" },
        { text: "Citizenship by jurisdiction is associated with?", options: ["International law", "Domestic law", "Natural law", "None of the above"], correct: "International law" },
        { text: "Citizenship by Nationality relates to?", options: ["Municipal law", "International law", "Natural law", "None of the above"], correct: "International law" },
        { text: "Any person born within the territorial jurisdiction of a state automatically becomes the citizen of a state by?", options: ["Jus soli", "Jus sagineris", "Jus sanguinis", "Jus Justus"], correct: "Jus soli" },
        { text: "Citizenship by birth in Latin words means?", options: ["Jus soli", "Jus sagineris", "Jus sanguinis", "Jus Justus"], correct: "Jus sanguinis" },
        { text: "What law permits a non-citizen of a state who was born or naturalized in another state to become a citizen of that state?", options: ["Law of the land", "Political law", "Law of Nationality", "Municipal law"], correct: "Law of the land" },
        { text: "A child born in a registered ship automatically becomes the citizen of the state where the ship is registered irrespective of the citizenship of the child's parents by virtue of?", options: ["Law of ship", "Law of craft", "Law of Nationality", "Law of the soil"], correct: "Law of the soil" },
        { text: "One of these is a method of acquiring citizenship status?", options: ["By Democracy", "By voting", "By legal process", "By permission"], correct: "By legal process" },
        { text: "One of these is not one of the ways of acquiring citizenship status by legal process?", options: ["Collective", "Derivative", "Direct", "None of the above"], correct: "None of the above" },
        { text: "A citizen of Nigeria by birth does not include?", options: ["Those born in Nigeria before independence whose parents are Nigerians", "Born in Nigeria after independence whose grandparents are Nigerians", "Those of whose parents are not Nigerians", "Those born abroad but whose parents are Nigerians"], correct: "Born in Nigeria after independence whose grandparents are Nigerians" },
        { text: "The limitations of citizens on the right to own property is found in the Land Use Decree of?", options: ["1999", "1989", "1978", "1977"], correct: "1978" },
        { text: "The legal process whereby a child/spouse becomes or acquires a citizenship status as a result of the parents, spouses or relatives is referred to as?", options: ["Double", "Single", "Collective", "Derivative"], correct: "Derivative" },
        { text: "One of these is not a condition considered in acquiring citizenship?", options: ["Language", "Residency", "Moral character", "Literacy"], correct: "Literacy" },
        { text: "The Residence duration required for acquisition of citizenship in USA is?", options: ["10 years", "15 years", "5 years", "2 years"], correct: "5 years" },
        { text: "The Residence duration required for acquisition of citizenship in Switzerland is?", options: ["12 years", "10 years", "13 years", "7 years"], correct: "12 years" },
        { text: "The Residence duration required for acquisition of citizenship in Britain is?", options: ["5 years", "10 years", "1 year", "3 years"], correct: "1 year" },
        { text: "One of these is not a method of Termination of citizenship?", options: ["Denationalization", "Expatriation", "All of the above", "None of the above"], correct: "All of the above" },
        { text: "A USA Naturalized National can lose his status if he stays in another country for a period of?", options: ["3 years", "5 years", "2 years", "8 years"], correct: "5 years" },
        { text: "A National of the United States of America can lose his citizenship if he stays in another country for a period of?", options: ["10 years", "2 years", "3 years", "8 years"], correct: "3 years" },
        { text: "A Nigerian National can lose his status if within seven years he gets imprisonment for a term not less than a period of?", options: ["1 year", "3 years", "4 years", "5 years"], correct: "3 years" },
        { text: "Loss of citizenship by voluntary renouncement of one's status either by a person who acquires his status by birth or by Naturalization is known as?", options: ["Denaturalization", "Expatriation", "Withdrawal of legal recognition using force", "Deportation"], correct: "Expatriation" }
    ];

    const TOTAL_QS = BASE_QUESTIONS.length;  // 30

    // Helper: shuffle array (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // For a given base question, return a new object with shuffled options and correct answer updated
    function randomizeOptionsOrder(question) {
        const origOptions = [...question.options];
        const correctAns = question.correct;
        let optList = origOptions.map(opt => ({ text: opt, isCorrect: opt === correctAns }));
        shuffleArray(optList);
        const newOptions = optList.map(item => item.text);
        const newCorrect = optList.find(item => item.isCorrect).text;
        return {
            text: question.text,
            options: newOptions,
            correct: newCorrect
        };
    }

    // Global quiz state
    let currentQuestions = [];   // array of question objects (after shuffling options)
    let currentIndex = 0;
    let userAnswers = new Array(TOTAL_QS).fill(null);
    let answerLocked = new Array(TOTAL_QS).fill(false);
    let quizFinished = false;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / TOTAL_QS) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = currentQuestions[currentIndex];
        if (!q) return;
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let addClass = '';
            if (isLocked) {
                if (opt === q.correct) addClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) addClass = 'selected-wrong';
                else addClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${addClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${letters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === TOTAL_QS - 1);
        const nextOrSubmit = isLast ?
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${TOTAL_QS}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${TOTAL_QS}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">${cardsHtml}</div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        if (!isLocked) {
            document.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    userAnswers[currentIndex] = card.getAttribute('data-opt-value');
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.onclick = () => { if (currentIndex > 0 && !quizFinished) { currentIndex--; renderCurrent(); } };
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => { if (answerLocked[currentIndex] && currentIndex < TOTAL_QS-1 && !quizFinished) { currentIndex++; renderCurrent(); } };
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) submitBtn.onclick = () => { if (answerLocked[currentIndex]) finishQuiz(); else alert("Please answer first."); };
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < TOTAL_QS; i++) {
            const correct = (userAnswers[i] === currentQuestions[i].correct);
            if (correct) score++;
            details.push({
                num: i+1,
                text: currentQuestions[i].text,
                user: userAnswers[i] || "(no answer)",
                correct: currentQuestions[i].correct,
                isCorrect: correct
            });
        }
        const percent = Math.round((score / TOTAL_QS) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! Strong understanding of citizenship, rights and social justice.";
        else if (percent >= 65) msg = "👍 Good. Review the methods of citizenship acquisition and termination.";
        else if (percent >= 45) msg = "📘 Fair. Focus on the differences between jus soli / jus sanguinis and residency requirements.";
        else msg = "📚 Re-read Chapters 6 & 7 – pay attention to Laski's conditions, types of rights, and legal processes.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        quizContainer.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${TOTAL_QS} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz (New Option Order)</button>
                </div>
            </div>
        `;
        quizFinished = true;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            initNewQuiz();
        });
    }

    function initNewQuiz() {
        // For each base question, randomize the order of its options
        currentQuestions = BASE_QUESTIONS.map(q => randomizeOptionsOrder(q));
        currentIndex = 0;
        userAnswers.fill(null);
        answerLocked.fill(false);
        quizFinished = false;
        renderCurrent();
        updateProgress();
    }

    // Start the quiz
    initNewQuiz();
</script>
</body>
</html>

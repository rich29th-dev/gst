<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.7 Quiz • Social Justice & Law • 30/50 Random • Randomized Options</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }
        .quiz-header h1 { font-size: 1.9rem; font-weight: 700; }
        .progress-container { background: #e0e7d9; height: 8px; }
        .progress-fill { background: #f5b042; height: 8px; width: 0%; transition: width 0.25s; }
        .quiz-content { padding: 40px 35px; }
        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }
        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
        }
        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }
        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }
        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }
        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }
        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .feedback-correct {
            background: #e1f5e8;
            border-left: 6px solid #2b5e3b;
            color: #1f5a3a;
        }
        .feedback-wrong {
            background: #ffe6e5;
            border-left: 6px solid #b3413a;
            color: #9b2f28;
        }
        .disabled-card { cursor: default; opacity: 0.7; }
        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }
        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #2b5e3b;
        }
        .nav-btn.primary { background: #f5b042; color: #2d2b1a; }
        .nav-btn.primary:hover:not(:disabled) { background: #e09d2c; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }
        .result-panel.show { display: block; }
        .score-big { font-size: 2rem; font-weight: 800; color: #2b5e3b; }
        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }
        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
        }
        @media (max-width: 600px) {
            .quiz-content { padding: 28px 20px; }
            .question-text { font-size: 1.3rem; }
            .answer-card { padding: 12px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>⚖️ Chapter 7 · Social Justice & Law</h1>
        <p>Bank of 50 questions • 30 random each time • Options randomized</p>
        <p style="font-size:0.85rem;">Refresh or click Restart for a new set</p>
    </div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on "Nigerian Peoples & Culture" – Chapter 7 (Social Justice, Development, Law Classifications)</footer>
</div>

<script>
    // ---------- QUESTION BANK: 50 questions for Chapter 7 ----------
    // Topics: social justice definitions, Rawls, rights, development, historical struggles, law definitions, classifications, theories
    const QUESTION_BANK = [
        // Social Justice definitions and concepts (10 questions)
        { text: "According to Rawls, social justice concerns fair and equitable distribution of what in a society?", options: ["Political power only", "Resources, opportunities, privileges, rights, duties, wealth, benefits and burdens", "Educational certificates", "Religious artifacts"], correct: "Resources, opportunities, privileges, rights, duties, wealth, benefits and burdens" },
        { text: "Which philosopher proposed the theory of 'justice as fairness' in his book 'A Theory of Justice'?", options: ["Jeremy Bentham", "John Rawls", "Karl Marx", "Max Weber"], correct: "John Rawls" },
        { text: "In Greek conception, justice covers legal, administrative, and ethical meanings, which is broader than the English meaning limited to:", options: ["Economic and social", "Judicial and administrative", "Political and religious", "Military and diplomatic"], correct: "Judicial and administrative" },
        { text: "According to Plato, justice is part of human virtue that makes man good, alongside wisdom, courage, and:", options: ["Wealth", "Temperance", "Beauty", "Strength"], correct: "Temperance" },
        { text: "The purpose of the state according to social contract theory is to provide an enabling environment for individuals to exercise freedom, while individuals must:", options: ["Submit their abilities to be regulated by the state", "Refuse all state authority", "Only obey religious laws", "Ignore the state completely"], correct: "Submit their abilities to be regulated by the state" },
        { text: "Perception of injustice is closely related to feelings of anger, envy, psychological depression, and:", options: ["Joy", "Moral outrage", "Indifference", "Gratitude"], correct: "Moral outrage" },
        { text: "Social justice is based on moral principles that put into consideration mostly which aspect of human life?", options: ["Economic", "Political", "Social", "Religious"], correct: "Social" },
        { text: "Which international document has consistently frowned upon social injustice in both developed and developing nations?", options: ["The Magna Carta", "United Nations International Declaration of Human Rights", "The Treaty of Versailles", "The Geneva Conventions"], correct: "United Nations International Declaration of Human Rights" },
        { text: "According to Chief Obafemi Awolowo, man is described as the sole creative, propulsive and dynamic force in nature, and the:", options: ["Prime mover in all activities", "Least important factor", "Obstacle to progress", "Result of development"], correct: "Prime mover in all activities" },
        { text: "The sharp divide between developing and developed countries is often an issue of:", options: ["Climate change", "Social injustice and international policies favoring developed countries", "Population size", "Geographical location"], correct: "Social injustice and international policies favoring developed countries" },

        // Rights, development parameters (8 questions)
        { text: "Which of the following is NOT one of the fundamental human rights listed in the chapter?", options: ["Right to life", "Right to dignity of human dignity", "Right to free housing", "Right to fair hearing"], correct: "Right to free housing" },
        { text: "The right to freedom of thought, conscience and religion is protected under which category?", options: ["Economic rights", "Fundamental human rights", "Property rights", "Political rights only"], correct: "Fundamental human rights" },
        { text: "According to the chapter, national development includes all EXCEPT:", options: ["Economic growth", "Equitable distribution", "Provision of health care and education", "Unlimited military spending"], correct: "Unlimited military spending" },
        { text: "GDP (Gross Domestic Product) is used by economists to measure development in terms of:", options: ["Religious observance", "Economic output", "Political freedom", "Cultural diversity"], correct: "Economic output" },
        { text: "Social indicators of development mentioned include good housing, accessible roads, improved health facilities, and:", options: ["Portable water supply and electricity", "Number of churches", "Military strength", "Foreign aid received"], correct: "Portable water supply and electricity" },
        { text: "The idea that all people should have equal access to wealth, health, wellbeing, justice, privileges and opportunity is called:", options: ["Social justice", "Economic efficiency", "Political stability", "Cultural preservation"], correct: "Social justice" },
        { text: "In ancient Rome, the class structure included patricians, knights, plebeians, and:", options: ["Slaves", "Merchants", "Priests", "Foreigners"], correct: "Slaves" },
        { text: "Marx and Engels traced the history of all hitherto existing society as the history of:", options: ["Class struggles", "Religious progress", "Technological innovation", "Peaceful cooperation"], correct: "Class struggles" },

        // Historical struggles for justice in Nigeria (6 questions)
        { text: "The Aba Women's Riot of 1929 was a protest against:", options: ["Imposition of direct tax on women", "Military conscription", "Forced labor", "Land seizure"], correct: "Imposition of direct tax on women" },
        { text: "In 1947, Nigerian miners were shot dead by police at which colliery?", options: ["Jos", "Enugu", "Kaduna", "Ibadan"], correct: "Enugu" },
        { text: "The general strike that took place in 1945 was a struggle by oppressed workers against:", options: ["British colonizers", "Traditional rulers", "Christian missionaries", "Foreign traders"], correct: "British colonizers" },
        { text: "The Willinck Commission was instituted to address feelings of marginalization by which groups?", options: ["Majority ethnic groups", "Minority groups during colonial era", "Women only", "Religious leaders"], correct: "Minority groups during colonial era" },
        { text: "The Oputa Panel examined instances of human rights abuses from 1st January 1984 to 28 May:", options: ["1990", "1999", "2003", "2007"], correct: "1999" },
        { text: "Which movement was formed to fight for the survival of the Ogoni people?", options: ["MASSOB", "MOSOP", "NADECO", "CLO"], correct: "MOSOP" },

        // Factors affecting social justice in Nigeria (5 questions)
        { text: "One factor in the failure of social justice in Nigeria mentioned is:", options: ["Too much foreign investment", "Poverty of political leadership", "High literacy rates", "Strong democratic traditions"], correct: "Poverty of political leadership" },
        { text: "Military presence in government dealt a dead blow on social justice during the regimes of Generals:", options: ["Gowon and Obasanjo", "Babangida and Abacha", "Buhari and Babangida", "Yar'Adua and Jonathan"], correct: "Babangida and Abacha" },
        { text: "Many Nigerians have become apolitical because politics has become a:", options: ["Peaceful contest of ideas", "Do or die affair", "Respected profession", "Source of community development"], correct: "Do or die affair" },
        { text: "Lack of education contributes to social injustice because illiterates may not know their:", options: ["Rights", "Ancestors", "Market prices", "Neighbors"], correct: "Rights" },
        { text: "Ways individuals can support social justice include educating oneself on a movement, working on personal habits, researching local presence, and:", options: ["Ignoring protests", "Taking action in one's community", "Staying silent", "Avoiding social media"], correct: "Taking action in one's community" },

        // Law definitions and nature (7 questions)
        { text: "Law is best defined as a system of rules that regulates the behavior of:", options: ["Only criminals", "Individuals, organizations, and governments", "Only the military", "Only religious groups"], correct: "Individuals, organizations, and governments" },
        { text: "According to Max Weber's sociological definition, law is a system of rules backed by force and enforced by:", options: ["The church", "A central authority", "The market", "Public opinion"], correct: "A central authority" },
        { text: "Legal positivism, as advocated by John Austin, asserts that the validity of a law is based on:", options: ["Its moral content", "Enactment by a recognized sovereign", "Religious approval", "Public referendum"], correct: "Enactment by a recognized sovereign" },
        { text: "Natural law theorists argue that law must align with:", options: ["Whatever the ruler wants", "Universal moral principles discoverable through reason", "The most efficient economic outcome", "Popular opinion"], correct: "Universal moral principles discoverable through reason" },
        { text: "The 'Rule of Law' ensures equality before the law, fairness in application, and:", options: ["Accountability of the government to the people", "Absolute power for the executive", "Suspension of courts during emergencies", "Immunity for officials"], correct: "Accountability of the government to the people" },
        { text: "Which characteristic of law means that it evolves over time in response to changes in society?", options: ["Legitimacy", "Enforceability", "Flexibility", "Morality"], correct: "Flexibility" },
        { text: "Legal positivists like Hart and natural law theorists differ on whether law and morality are:", options: ["Completely unrelated", "Separate or inherently linked", "Exactly the same", "Opposites"], correct: "Separate or inherently linked" },

        // Classifications of law (10 questions)
        { text: "Public law governs the relationship between individuals and the state and includes all EXCEPT:", options: ["Constitutional law", "Administrative law", "Criminal law", "Contract law"], correct: "Contract law" },
        { text: "Private law governs relationships between private individuals and entities and includes:", options: ["Constitutional law", "Criminal law", "Contract law and tort law", "Administrative law"], correct: "Contract law and tort law" },
        { text: "Constitutional law outlines fundamental rights and liberties and governs:", options: ["Only local governments", "Structure and functioning of government institutions", "International trade", "Private business disputes"], correct: "Structure and functioning of government institutions" },
        { text: "Criminal law defines offenses against the state and aims to:", options: ["Compensate victims only", "Deter crime, punish wrongdoers, and protect society", "Regulate contracts", "Resolve family disputes"], correct: "Deter crime, punish wrongdoers, and protect society" },
        { text: "Substantive law outlines rights and duties, while procedural law concerns:", options: ["The substance of laws", "Methods and procedures for enforcing legal rights", "Criminal penalties only", "International treaties"], correct: "Methods and procedures for enforcing legal rights" },
        { text: "Civil law deals with legal disputes between private parties, typically involving:", options: ["Imprisonment", "Claims for compensation or injunctions", "Capital punishment", "National security"], correct: "Claims for compensation or injunctions" },
        { text: "Common law, originating in England, is based on:", options: ["Written codes and statutes", "Judicial decisions, customs, and precedent", "Religious scriptures", "Executive decrees"], correct: "Judicial decisions, customs, and precedent" },
        { text: "Civil law systems (e.g., France, Germany) primarily rely on:", options: ["Case law and precedent", "Written codes and statutes", "Customary tribal law", "Military regulations"], correct: "Written codes and statutes" },
        { text: "International law governs conduct between states and includes treaties on issues such as:", options: ["Only trade", "Trade, human rights, and environmental protection", "Only military alliances", "Only diplomatic immunity"], correct: "Trade, human rights, and environmental protection" },
        { text: "Tort law addresses civil wrongs that cause harm and provides remedies typically in the form of:", options: ["Imprisonment", "Damages (financial compensation)", "Exile", "Corporal punishment"], correct: "Damages (financial compensation)" },

        // Theories of law (4 questions to reach 50)
        { text: "Which school of jurisprudence asserts that law is not just a set of abstract rules but is influenced by actions and biases of judges?", options: ["Natural law", "Legal positivism", "Legal realism", "Historical school"], correct: "Legal realism" },
        { text: "Critical Legal Studies scholars argue that law is often used to reinforce the interests of:", options: ["Marginalized communities", "The poor", "Powerful groups at the expense of marginalized communities", "Religious institutions"], correct: "Powerful groups at the expense of marginalized communities" },
        { text: "The Historical school of law believes that law must accord with the history and way of life of the people, that is, their:", options: ["Written constitution", "Custom together", "Religious texts", "Economic system"], correct: "Custom together" },
        { text: "According to the Historical school, a 'spirit of the people' binds a particular society together and distinguishes them from:", options: ["Their ancestors", "Their descendants", "Any other people", "Foreign traders"], correct: "Any other people" }
    ];

    // Ensure we have exactly 50 questions
    console.assert(QUESTION_BANK.length === 50, `Question bank has ${QUESTION_BANK.length} questions, expected 50.`);

    // Helper: shuffle array (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Randomly select N distinct questions from bank
    function selectRandomQuestions(bank, count) {
        const shuffled = shuffleArray([...bank]);
        return shuffled.slice(0, count);
    }

    // For a given question, randomize the order of its options and update the correct answer accordingly
    function randomizeOptionsOrder(question) {
        const originalOptions = [...question.options];
        const correctAnswer = question.correct;
        let optList = originalOptions.map(opt => ({ text: opt, isCorrect: opt === correctAnswer }));
        // Shuffle
        for (let i = optList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optList[i], optList[j]] = [optList[j], optList[i]];
        }
        const newOptions = optList.map(item => item.text);
        const newCorrect = optList.find(item => item.isCorrect).text;
        return {
            text: question.text,
            options: newOptions,
            correct: newCorrect
        };
    }

    // Global quiz state
    let currentQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let answerLocked = [];
    let quizFinished = false;
    const totalQuestionsSelected = 30;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / totalQuestionsSelected) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = currentQuestions[currentIndex];
        if (!q) return;
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let addClass = '';
            if (isLocked) {
                if (opt === q.correct) addClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) addClass = 'selected-wrong';
                else addClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${addClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${letters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === totalQuestionsSelected - 1);
        const nextOrSubmit = isLast ?
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${totalQuestionsSelected}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${totalQuestionsSelected}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">${cardsHtml}</div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        if (!isLocked) {
            document.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    userAnswers[currentIndex] = card.getAttribute('data-opt-value');
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.onclick = () => { if (currentIndex > 0 && !quizFinished) { currentIndex--; renderCurrent(); } };
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => { if (answerLocked[currentIndex] && currentIndex < totalQuestionsSelected-1 && !quizFinished) { currentIndex++; renderCurrent(); } };
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) submitBtn.onclick = () => { if (answerLocked[currentIndex]) finishQuiz(); else alert("Please answer first."); };
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < totalQuestionsSelected; i++) {
            const correct = (userAnswers[i] === currentQuestions[i].correct);
            if (correct) score++;
            details.push({
                num: i+1,
                text: currentQuestions[i].text,
                user: userAnswers[i] || "(no answer)",
                correct: currentQuestions[i].correct,
                isCorrect: correct
            });
        }
        const percent = Math.round((score / totalQuestionsSelected) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You have a strong grasp of social justice, rights, and law classifications.";
        else if (percent >= 65) msg = "👍 Good. Review Rawls' theory, the classifications of law, and historical struggles for justice.";
        else if (percent >= 45) msg = "📘 Fair. Focus on the difference between public/private law and the theories of jurisprudence.";
        else msg = "📚 Re-read Chapter 7 carefully – definitions, fundamental rights, and legal classifications are key.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        quizContainer.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${totalQuestionsSelected} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz (New Random Set)</button>
                </div>
            </div>
        `;
        quizFinished = true;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            initNewQuiz();
        });
    }

    function initNewQuiz() {
        // Select 30 random questions from bank of 50
        const rawSelected = selectRandomQuestions(QUESTION_BANK, 30);
        // For each selected question, randomize option order
        currentQuestions = rawSelected.map(q => randomizeOptionsOrder(q));
        currentIndex = 0;
        userAnswers = new Array(30).fill(null);
        answerLocked = new Array(30).fill(false);
        quizFinished = false;
        renderCurrent();
        updateProgress();
    }

    // Start the quiz
    initNewQuiz();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.3 Quiz • Indigenous Language in Nigeria • One per page • Instant Feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }

        .quiz-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .quiz-header p {
            margin-top: 8px;
            opacity: 0.85;
            font-weight: 500;
        }

        .progress-container {
            background: #e0e7d9;
            height: 8px;
            width: 100%;
        }

        .progress-fill {
            background: #f5b042;
            height: 8px;
            width: 0%;
            transition: width 0.25s ease;
        }

        .quiz-content {
            padding: 40px 35px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }

        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }

        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
            transform: scale(1.01);
        }

        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }

        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }

        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }

        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }

        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            background: #fcf4e3;
            border-left: 6px solid #f5b042;
        }

        .feedback-correct {
            background: #e1f5e8;
            border-left-color: #2b5e3b;
            color: #1f5a3a;
        }

        .feedback-wrong {
            background: #ffe6e5;
            border-left-color: #b3413a;
            color: #9b2f28;
        }

        .disabled-card {
            cursor: default;
            opacity: 0.7;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }

        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #2b5e3b;
        }

        .nav-btn.primary {
            background: #f5b042;
            color: #2d2b1a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .nav-btn.primary:hover:not(:disabled) {
            background: #e09d2c;
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }

        .result-panel.show {
            display: block;
        }

        .score-big {
            font-size: 2rem;
            font-weight: 800;
            color: #2b5e3b;
            margin-bottom: 12px;
        }

        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }

        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
            border-top: 1px solid #e2d5bc;
        }

        @media (max-width: 600px) {
            .quiz-content {
                padding: 28px 20px;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .answer-card {
                padding: 12px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>🗣️ Chapter 3 · Indigenous Language in Nigeria</h1>
        <p>Definition • Features • Indigenous vs Foreign • Language Relativity • Current Challenges</p>
        <p style="font-size:0.85rem;">⚡ Tap an answer → immediate feedback shows correct answer. 40 questions.</p>
    </div>
    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on "Nigerian Peoples & Culture" – Chapter 3 (Indigenous Language)</footer>
</div>

<script>
    // ---------- 40 QUESTIONS for Chapter 3 (Indigenous Language in Nigeria) ----------
    const QUESTIONS = [
        { text: "Language is often referred to as a tool that advances human existence and demeans what philosophical concept?", options: ["Solipsism", "Empiricism", "Rationalism", "Nihilism"], correct: "Solipsism" },
        { text: "Which of the following is NOT a type of language mentioned in the chapter?", options: ["Sign Language", "Signal Language", "Symbolic language", "Mathematical language"], correct: "Mathematical language" },
        { text: "According to Chapter 3, language is universal. What does this mean?", options: ["Everyone speaks English", "No human group exists without language", "All languages sound the same", "Only humans have language"], correct: "No human group exists without language" },
        { text: "The relativity of language implies that:", options: ["All languages are the same", "Every culture has its own language peculiar to its people", "Language changes every year", "Only one language is correct"], correct: "Every culture has its own language peculiar to its people" },
        { text: "The industrial revolution played a major role in creating the impression that which language is the global language?", options: ["French", "Spanish", "English", "German"], correct: "English" },
        { text: "Among the Benin people of Edo State, the indigenous language is called:", options: ["Edo or Bini", "Esan", "Urhobo", "Yoruba"], correct: "Edo or Bini" },
        { text: "The feature of language that means it is open to everyone who exists in a particular culture is called:", options: ["Universal", "Relative", "Transparent", "Dynamic"], correct: "Transparent" },
        { text: "Indigenous language is also popularly known as:", options: ["Formal language", "Local language", "Official language", "Colonial language"], correct: "Local language" },
        { text: "Which of the following is NOT listed as a characteristic of people who share an indigenous language?", options: ["Origin", "Traditions", "Currency", "Greetings"], correct: "Currency" },
        { text: "According to the chapter, language does NOT pre-date man. Instead:", options: ["Language was created by animals", "Man created language to communicate", "Language fell from heaven", "Language is eternal"], correct: "Man created language to communicate" },
        { text: "Indigenous language possesses a dual nature: it is closed on one hand and what on the other?", options: ["Secret", "Open", "Hidden", "Silent"], correct: "Open" },
        { text: "Indigenous language is 'closed' to:", options: ["All foreigners", "Those who do not belong to the culture where it is spoken", "Only children", "Only the elderly"], correct: "Those who do not belong to the culture where it is spoken" },
        { text: "The chapter states that children who relocate with their parents learn indigenous language faster because:", options: ["They are forced to", "They have high propensity to interact with peers", "It is easier for children", "Schools teach it"], correct: "They have high propensity to interact with peers" },
        { text: "The process of receiving information in a language is known as:", options: ["Decoding", "Encoding", "Translating", "Interpreting"], correct: "Encoding" },
        { text: "The process of processing and interpreting language content is called:", options: ["Encoding", "Decoding", "Listening", "Speaking"], correct: "Decoding" },
        { text: "When someone says 'I no dey hear your language', they are actually saying:", options: ["They are deaf", "They do not understand the speaker", "The speaker is too loud", "They dislike the speaker"], correct: "They do not understand the speaker" },
        { text: "Indigenous language holds the preservation of a people's:", options: ["Only their economy", "Culture, tradition, heritage, and religious disposition", "Political system", "Military strength"], correct: "Culture, tradition, heritage, and religious disposition" },
        { text: "The problem of indigenous language in Nigeria is NOT proper usage but:", options: ["Lack of vocabulary", "Lack of frequent and consistent usage", "Too many dialects", "Government ban"], correct: "Lack of frequent and consistent usage" },
        { text: "How many indigenous languages is Nigeria known to have according to the chapter?", options: ["About 250", "About 521", "About 100", "About 374"], correct: "About 521" },
        { text: "How many indigenous languages are officially recognized in Nigeria?", options: ["Three (Yoruba, Hausa, Igbo)", "One (English)", "All 521", "None"], correct: "Three (Yoruba, Hausa, Igbo)" },
        { text: "Why are indigenous languages rapidly dying away in Nigeria?", options: ["They are difficult to learn", "Negative orientation that local languages are uncivilized", "Government outlawed them", "They have no words for modern things"], correct: "Negative orientation that local languages are uncivilized" },
        { text: "Contemporary Nigeria often profiles individual competence based on proficiency in which language?", options: ["Hausa", "Yoruba", "Igbo", "English"], correct: "English" },
        { text: "According to the chapter, indigenous language does NOT have recognition in:", options: ["Home conversations", "Marketplaces", "Formal engagements", "Village meetings"], correct: "Formal engagements" },
        { text: "The infamous notion that English is the universal language emerged during which era?", options: ["Renaissance", "Industrial Revolution", "Digital Age", "Middle Ages"], correct: "Industrial Revolution" },
        { text: "Which of the following is a feature of language according to the chapter?", options: ["Language is static", "Language is only material", "Language is both material and non-material", "Language is only written"], correct: "Language is both material and non-material" },
        { text: "A Benin man can understand an Esan man speaking Esan to a large extent. This illustrates:", options: ["Language universality", "Language transparency", "Similarities and variations between languages", "Language death"], correct: "Similarities and variations between languages" },
        { text: "The chapter argues that English language is erroneously believed to be Nigeria's:", options: ["Mother tongue", "Official language", "Indigenous language", "Trade language"], correct: "Official language" },
        { text: "People who frequently use their indigenous language are often interpreted as:", options: ["Intelligent", "Civilized", "Uncivilized and unintelligent", "Educated"], correct: "Uncivilized and unintelligent" },
        { text: "Language translates to how a group of people perceive the:", options: ["World", "Past", "Future", "Animals"], correct: "World" },
        { text: "According to the chapter, what is needed to resolve the encoding/decoding gap between different indigenous language speakers?", options: ["A dictionary", "A translator", "More education", "Sign language"], correct: "A translator" },
        { text: "The chapter states that Africa (like Nigeria) has no official or single language via which it can express itself to the:", options: ["World", "Past generations", "Its own people", "Neighbors"], correct: "World" },
        { text: "Which of the following is NOT given as a basic feature of language in Chapter 3?", options: ["Language is universal", "Language is relative", "Language is transparent", "Language is political"], correct: "Language is political" },
        { text: "Oral or verbal language is described as the main focus of the chapter's discussion on:", options: ["Sign language", "Written language", "Types of language", "Animal language"], correct: "Types of language" },
        { text: "According to the chapter, what does the phrase 'indigenous language holds how a culture sees his world' mean?", options: ["Language determines economic success", "Language reflects a people's worldview and interaction with reality", "Language is only for storytelling", "Language is irrelevant to culture"], correct: "Language reflects a people's worldview and interaction with reality" },
        { text: "The chapter mentions that research has revealed that children who relocate learn indigenous language faster than their parents because:", options: ["They attend language school", "Parents are too busy", "Children interact more with peers", "It is required by law"], correct: "Children interact more with peers" },
        { text: "The dual nature of indigenous language (closed/open) implies that:", options: ["It is secret forever", "Outsiders can never learn it", "It is closed to non-members but open to those who make effort to learn", "Only elders can speak it"], correct: "It is closed to non-members but open to those who make effort to learn" },
        { text: "According to the author, which language is NOT an official language of Nigeria despite common misconception?", options: ["Hausa", "Igbo", "Yoruba", "English"], correct: "English" },
        { text: "The chapter concludes that indigenous language reflects the wisdom and intelligence of a:", options: ["Individual", "Government", "Group or community of people", "School system"], correct: "Group or community of people" },
        { text: "Which century saw the rationalist/industrial revolution that promoted English as a global language?", options: ["13th-14th", "15th-16th", "17th-18th", "19th-20th"], correct: "15th-16th" },
        { text: "The author states that without language, human existence would translate to solipsism, which means:", options: ["Happiness", "Meaninglessness and nothingness", "Overpopulation", "Technological advancement"], correct: "Meaninglessness and nothingness" }
    ];

    const total = QUESTIONS.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);      // stores selected answer text
    let answerLocked = new Array(total).fill(false);   // prevents re-answering
    let quizFinished = false;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / total) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = QUESTIONS[currentIndex];
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const prefixLetters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let additionalClass = '';
            if (isLocked) {
                if (opt === q.correct) additionalClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) additionalClass = 'selected-wrong';
                else additionalClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${additionalClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${prefixLetters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct! “${escapeHtml(selectedAnswer)}” is the right answer.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. You chose “${escapeHtml(selectedAnswer)}”. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === total-1);
        const nextOrSubmit = isLast ? 
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${total}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${total}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">
                ${cardsHtml}
            </div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        // Attach answer click handlers only if not locked
        if (!isLocked) {
            const cards = document.querySelectorAll('.answer-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    const chosen = card.getAttribute('data-opt-value');
                    userAnswers[currentIndex] = chosen;
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        // Navigation
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0 && !quizFinished) {
                    currentIndex--;
                    renderCurrent();
                }
            });
        }
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!answerLocked[currentIndex]) return;
                if (currentIndex < total-1 && !quizFinished) {
                    currentIndex++;
                    renderCurrent();
                }
            });
        }
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', () => {
                if (!answerLocked[currentIndex]) {
                    alert("Please answer the current question before finishing.");
                    return;
                }
                finishQuiz();
            });
        }
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < total; i++) {
            const correct = (userAnswers[i] === QUESTIONS[i].correct);
            if (correct) score++;
            details.push({
                num: i+1,
                text: QUESTIONS[i].text,
                user: userAnswers[i] || "(not answered)",
                correct: QUESTIONS[i].correct,
                isCorrect: correct
            });
        }
        const percent = Math.round((score / total) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You have a strong grasp of indigenous language concepts.";
        else if (percent >= 65) msg = "👍 Good! Review the features of language and the number of Nigerian languages.";
        else if (percent >= 45) msg = "📘 Fair. Study the sections on language relativity and the decline of indigenous languages.";
        else msg = "📚 Re-read Chapter 3 carefully – focus on definitions, types, and the challenges facing indigenous languages in Nigeria.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        const finalDisplay = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${total} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz</button>
                </div>
            </div>
        `;
        quizContainer.innerHTML = finalDisplay;
        quizFinished = true;
        const restart = document.getElementById('restartQuizBtn');
        if (restart) {
            restart.addEventListener('click', () => {
                resetQuiz();
            });
        }
    }

    function resetQuiz() {
        currentIndex = 0;
        userAnswers.fill(null);
        answerLocked.fill(false);
        quizFinished = false;
        renderCurrent();
        updateProgress();
    }

    // initial render
    renderCurrent();
    updateProgress();
</script>
</body>
</html>

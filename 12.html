<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.1&2 Combined Quiz • 60 Questions • Major & Minority Groups</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }
        .quiz-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
        }
        .progress-container {
            background: #e0e7d9;
            height: 8px;
        }
        .progress-fill {
            background: #f5b042;
            height: 8px;
            width: 0%;
            transition: width 0.25s;
        }
        .quiz-content {
            padding: 40px 35px;
        }
        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }
        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
        }
        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }
        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }
        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }
        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }
        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .feedback-correct {
            background: #e1f5e8;
            border-left: 6px solid #2b5e3b;
            color: #1f5a3a;
        }
        .feedback-wrong {
            background: #ffe6e5;
            border-left: 6px solid #b3413a;
            color: #9b2f28;
        }
        .disabled-card {
            cursor: default;
            opacity: 0.7;
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }
        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #2b5e3b;
        }
        .nav-btn.primary {
            background: #f5b042;
            color: #2d2b1a;
        }
        .nav-btn.primary:hover:not(:disabled) {
            background: #e09d2c;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }
        .result-panel.show {
            display: block;
        }
        .score-big {
            font-size: 2rem;
            font-weight: 800;
            color: #2b5e3b;
        }
        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }
        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
        }
        @media (max-width: 600px) {
            .quiz-content { padding: 28px 20px; }
            .question-text { font-size: 1.3rem; }
            .answer-card { padding: 12px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>📚 Chapters 1 & 2 · Major & Minority Ethnic Groups</h1>
        <p>Hausa-Fulani • Yoruba • Igbo • Bini • Itsekiri • Urhobo • Ijaw • Jukun • Tiv</p>
        <p>60 questions • Blended options • One per page</p>
    </div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on Nigerian Peoples & Culture – Chapters 1 & 2</footer>
</div>

<script>
    // 60 QUESTIONS covering Chapters 1 and 2 in depth – all options neutral, no obvious hints
    const QUESTIONS = [
        // Chapter 1 – General / Geography / History
        { text: "Where was the earliest evidence of civilization in Nigeria found?", options: ["Near the city of Kano", "Inside a rock shelter close to Akure", "Along the banks of the Niger River", "In the ancient kingdom of Nri"], correct: "Inside a rock shelter close to Akure" },
        { text: "Approximately what percentage of Nigeria's population do the three largest ethnic groups represent?", options: ["About 50 percent", "Around 70 percent", "Nearly 85 percent", "Just over 40 percent"], correct: "Around 70 percent" },
        { text: "Which of the following is NOT one of the three major ethnic groups in Nigeria?", options: ["Yoruba", "Hausa-Fulani", "Igbo", "Bini"], correct: "Bini" },
        { text: "The Iwo Eleru skeleton, dating back to 9000 BC, was found in which present-day state?", options: ["Oyo", "Ondo", "Osun", "Edo"], correct: "Ondo" },
        { text: "What is the total land area of Nigeria (excluding waterways)?", options: ["923,768 sq km", "910,768 sq km", "900,000 sq km", "950,000 sq km"], correct: "910,768 sq km" },
        // Hausa (Chapter 1)
        { text: "According to oral tradition, which refugee prince is said to have founded the seven Hausa states?", options: ["Oduduwa", "Bayajida", "Oranmiyan", "Eri"], correct: "Bayajida" },
        { text: "What was the name of the well in Daura that Bayajida helped to clear of a snake?", options: ["Rijiyar Sarki", "Kusugu well", "Matsiga pond", "Gidan Rumfa"], correct: "Kusugu well" },
        { text: "What are the seven original Hausa states collectively called?", options: ["Hausa Bakwai", "Banza Bakwai", "Yedi Hausa", "Hausa Bokwoi"], correct: "Hausa Bakwai" },
        { text: "What was the title of the head of a typical Hausa state?", options: ["Emir", "Sarki", "Alkali", "Galadima"], correct: "Sarki" },
        { text: "Which Islamic legal system began to take shape in Hausa land after the 14th-15th centuries?", options: ["Common law", "Sharia law", "Canon law", "Customary law"], correct: "Sharia law" },
        { text: "What term refers to the tax on livestock in the Hausa Islamic fiscal system?", options: ["Zakat", "Jangali", "Kharaj", "Jizya"], correct: "Jangali" },
        { text: "Pagan Hausa traditionally worshipped natural spirits known as:", options: ["Alusi", "Iskoki", "Orisa", "Ebo"], correct: "Iskoki" },
        { text: "Which of the following was NOT one of the original seven Hausa states?", options: ["Biram", "Kano", "Katsina", "Sokoto"], correct: "Sokoto" },
        { text: "The office of 'Galadima' in Hausa land is associated with the influence of:", options: ["Christianity", "Islam", "Traditional religion", "British colonialism"], correct: "Islam" },
        // Fulani (Chapter 1)
        { text: "What code of behavior do the Fulani strive to maintain wherever they go?", options: ["Pulaaku", "Omoluabi", "Onye Oji", "Harambee"], correct: "Pulaaku" },
        { text: "The Fulani are mainly known for which primary occupation?", options: ["Farming", "Cattle herding", "Trading", "Fishing"], correct: "Cattle herding" },
        { text: "What is the name the Fulani call themselves?", options: ["Peul", "Fula", "Fulbe", "Fellata"], correct: "Fulbe" },
        { text: "Which category of Fulani has maintained a nomadic way of life?", options: ["Fulanin gida", "Fulani daji", "Fulani Bororo", "Fulani Torobe"], correct: "Fulani daji" },
        // Yoruba (Chapter 1)
        { text: "Which town is considered the spiritual motherland of the Yoruba people?", options: ["Oyo", "Ife", "Ilesa", "Ogbomoso"], correct: "Ife" },
        { text: "According to one myth, who descended from heaven to create the earth at Ile-Ife?", options: ["Sango", "Obatala", "Oduduwa", "Ogun"], correct: "Oduduwa" },
        { text: "What is the council of hereditary advisers in Oyo called?", options: ["Ogboni", "Oyomesi", "Iwarefa", "Eso"], correct: "Oyomesi" },
        { text: "In Yoruba political system, the Oba's powers were checked by all EXCEPT:", options: ["Council of chiefs", "Ogboni society", "Ifa divination", "The army general"], correct: "The army general" },
        { text: "Yoruba marriage is exogamous, meaning it involves:", options: ["Marriage within the same lineage", "Two previously unrelated families", "Only first cousins", "Only royalty"], correct: "Two previously unrelated families" },
        { text: "Which Yoruba deity is associated with thunder and lightning?", options: ["Ogun", "Sango", "Obatala", "Olokun"], correct: "Sango" },
        { text: "What is the name of the Yoruba system of cooperative farming labor?", options: ["Owe", "Aaro", "Isobo", "Egbe"], correct: "Aaro" },
        { text: "The Oyo Empire developed a more complex military and political system than which earlier Yoruba center?", options: ["Owu", "Ife", "Ijebu", "Egba"], correct: "Ife" },
        // Igbo (Chapter 1)
        { text: "How is the traditional Igbo political system best described?", options: ["Centralized monarchy", "Acephalous or segmentary", "Theocratic rule", "Feudal hierarchy"], correct: "Acephalous or segmentary" },
        { text: "What was the name of the general assembly in traditional Igbo society?", options: ["Amala Oha", "Otu Ofo", "Umuada", "Izu"], correct: "Amala Oha" },
        { text: "Which title holders in Igbo land were recognized based on individual capability rather than birth?", options: ["Oba and Olu", "Ozo, Nze, and Ezeji", "Sarki and Galadima", "Uzama and Eghaebvo"], correct: "Ozo, Nze, and Ezeji" },
        { text: "What is the staff of authority among the Igbo called?", options: ["Ofo", "Ada", "Nza", "Omu"], correct: "Ofo" },
        { text: "The Nri version of Igbo origin claims that ancestor Eri descended from the sky and sailed down which river?", options: ["Niger", "Anambra", "Cross River", "Benue"], correct: "Anambra" },
        { text: "In Igbo tradition, the naming ceremony is usually performed on which day after birth?", options: ["7th day", "14th day", "28th day", "30th day"], correct: "28th day" },
        // Bini (Chapter 2)
        { text: "The Portuguese explorer Ruy de Sequeira arrived in Benin during whose reign?", options: ["Oba Ozolua", "Oba Ewuare", "Oba Ovonramwen", "Oba Erediauwa"], correct: "Oba Ewuare" },
        { text: "What is the name of the first period of pre-colonial Bini history?", options: ["Ogiso era", "Eweka dynasty", "Uzama era", "Oba period"], correct: "Ogiso era" },
        { text: "Who was the last Ogiso of Benin?", options: ["Ere", "Igbodo", "Owodo", "Ekaladeran"], correct: "Owodo" },
        { text: "In Bini society, the nobility class is called:", options: ["Ighiotu", "Adesotu", "Uzama", "Eghaebvo"], correct: "Adesotu" },
        { text: "What did the youngest child of Osanobua use to create land?", options: ["A snail shell", "A calabash", "An iron rod", "A wooden staff"], correct: "A snail shell" },
        { text: "Which Ogiso is credited with forming the guild system in Benin?", options: ["Igbodo", "Ere", "Owodo", "Oranmiyan"], correct: "Ere" },
        { text: "Who established the Eweka dynasty in Benin?", options: ["Ekaladeran", "Oranmiyan", "Oba Ewuare", "Iginuwa"], correct: "Oranmiyan" },
        { text: "What were the professional groups of common people in Benin called?", options: ["Adesotu", "Guilds", "Age sets", "Wards"], correct: "Guilds" },
        // Itsekiri (Chapter 2)
        { text: "Who founded the Itsekiri kingdom?", options: ["Oba Olua", "Iginuwa", "Oranmiyan", "Ere"], correct: "Iginuwa" },
        { text: "The traditional ruler of the Itsekiri is called:", options: ["Oba", "Olu", "Ovie", "Olofin"], correct: "Olu" },
        { text: "The Itsekiri political system was modeled after which kingdom?", options: ["Oyo", "Benin", "Hausa", "Igbo"], correct: "Benin" },
        // Urhobo (Chapter 2)
        { text: "The traditional ruler of an Urhobo village is known as:", options: ["Oba", "Olu", "Ovie", "Eze"], correct: "Ovie" },
        { text: "One version of Urhobo origin traces them to which group?", options: ["Benin", "Ijaw", "Yoruba", "Igbo"], correct: "Ijaw" },
        { text: "Another version of Urhobo origin traces them to immigrants from:", options: ["Benin", "Ife", "Igbo land", "Nupe"], correct: "Benin" },
        { text: "Urhobo adult males were divided into age sets corresponding to:", options: ["Farmers, warriors, priests", "Youth, middle age, elders", "Traders, fishermen, craftsmen", "Commoners, nobles, royals"], correct: "Youth, middle age, elders" },
        // Ijaw (Chapter 2)
        { text: "What political structure characterized traditional Ijaw societies?", options: ["House System", "Age grade system", "Emirate system", "Oba system"], correct: "House System" },
        { text: "Which of these is a major traditional Ijaw state?", options: ["Kano", "Bonny", "Oyo", "Sokoto"], correct: "Bonny" },
        { text: "Why did the Ijaw not develop a centralized state according to scholars?", options: ["They preferred monarchy", "Scattered small fishing settlements in creeks", "Influence of Islam", "Colonial interference"], correct: "Scattered small fishing settlements in creeks" },
        { text: "Which Ijaw state is known alongside Bonny, Kalabari, and Opobo?", options: ["Brass-Nemba", "Warri", "Okrika", "Nembe"], correct: "Brass-Nemba" },
        // Jukun (Chapter 2)
        { text: "According to the Kano Chronicle, in which centuries did the Jukun raid Hausaland?", options: ["12th-13th", "14th-15th", "16th-17th", "18th-19th"], correct: "16th-17th" },
        { text: "The Jukun supreme deity is called:", options: ["Aondo", "Shido or Chido", "Osanobua", "Chukwu"], correct: "Shido or Chido" },
        { text: "The most authentic written source about Jukun history is the:", options: ["Bornu Chronicle", "Kano Chronicle", "Yoruba Oriki", "Benin oral tradition"], correct: "Kano Chronicle" },
        // Tiv (Chapter 2)
        { text: "The Tiv people are the largest single ethnic group in which basin?", options: ["Lake Chad basin", "Middle Benue basin", "Niger Delta basin", "Sokoto basin"], correct: "Middle Benue basin" },
        { text: "The largest recognized family group among the Tiv is known as:", options: ["Mbavessen", "Tombor", "Ityough", "Swem"], correct: "Tombor" },
        { text: "In Tiv traditional belief, witchcraft is believed to be practiced by:", options: ["Only women", "Only men", "Both genders", "Elders only"], correct: "Only men" },
        { text: "What is the name of the Supreme God among the Tiv?", options: ["Aondo", "Soko", "Katakuru", "Ashili"], correct: "Aondo" },
        { text: "The head of a Tiv family unit is called:", options: ["Oba", "Mbavessen", "Sarki", "Ovie"], correct: "Mbavessen" },
        { text: "Among the Nupe and Gwari, witches are almost invariably:", options: ["Men", "Women", "Children", "Chiefs"], correct: "Women" },
        // Cross / mixed from both chapters
        { text: "Which ethnic group is known for the 'Onye Oji' system of apprenticeship?", options: ["Yoruba", "Igbo", "Hausa", "Bini"], correct: "Igbo" },
        { text: "The 'Guinea Savanna' region is described as representing the best hope for what in Nigeria?", options: ["Economic growth", "Religious tolerance", "Political stability", "Educational advancement"], correct: "Religious tolerance" },
        { text: "Which ethnic group's traditional religion includes deities such as Sango, Ogun, and Obatala?", options: ["Igbo", "Yoruba", "Hausa", "Bini"], correct: "Yoruba" },
        { text: "The 'West African yam belt' includes the Nupe, Koto, and which group?", options: ["Igbo", "Tiv", "Yoruba", "Ijaw"], correct: "Tiv" }
    ];

    // Ensure we have exactly 60 questions
    console.assert(QUESTIONS.length === 60, "Expected 60 questions, got " + QUESTIONS.length);

    const total = QUESTIONS.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);
    let answerLocked = new Array(total).fill(false);
    let quizFinished = false;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / total) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = QUESTIONS[currentIndex];
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let addClass = '';
            if (isLocked) {
                if (opt === q.correct) addClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) addClass = 'selected-wrong';
                else addClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${addClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${letters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === total-1);
        const nextOrSubmit = isLast ?
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${total}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${total}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">${cardsHtml}</div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        if (!isLocked) {
            document.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    userAnswers[currentIndex] = card.getAttribute('data-opt-value');
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.onclick = () => { if (currentIndex > 0 && !quizFinished) { currentIndex--; renderCurrent(); } };
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => { if (answerLocked[currentIndex] && currentIndex < total-1 && !quizFinished) { currentIndex++; renderCurrent(); } };
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) submitBtn.onclick = () => { if (answerLocked[currentIndex]) finishQuiz(); else alert("Please answer first."); };
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < total; i++) {
            const correct = (userAnswers[i] === QUESTIONS[i].correct);
            if (correct) score++;
            details.push({ num: i+1, text: QUESTIONS[i].text, user: userAnswers[i] || "(no answer)", correct: QUESTIONS[i].correct, isCorrect: correct });
        }
        const percent = Math.round((score / total) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You know Nigeria's ethnic groups inside out.";
        else if (percent >= 65) msg = "👍 Good. Review the origin stories, political systems, and minority group details.";
        else if (percent >= 45) msg = "📘 Fair. Focus on the seven Hausa states, Yoruba checks, Igbo acephalous system, Bini Ogiso era, and Tiv beliefs.";
        else msg = "📚 Re-read Chapters 1 and 2 – pay attention to specific names, titles, and cultural details.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        quizContainer.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${total} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz</button>
                </div>
            </div>
        `;
        quizFinished = true;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            currentIndex = 0;
            userAnswers.fill(null);
            answerLocked.fill(false);
            quizFinished = false;
            renderCurrent();
            updateProgress();
        });
    }

    renderCurrent();
    updateProgress();
</script>
</body>
</html>

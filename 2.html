<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.2 Quiz • Instant Answer Feedback • One per page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.2s;
        }

        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }

        .quiz-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .quiz-header p {
            margin-top: 8px;
            opacity: 0.85;
            font-weight: 500;
        }

        .progress-container {
            background: #e0e7d9;
            height: 8px;
            width: 100%;
        }

        .progress-fill {
            background: #f5b042;
            height: 8px;
            width: 0%;
            transition: width 0.25s ease;
        }

        .quiz-content {
            padding: 40px 35px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }

        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }

        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
            transform: scale(1.01);
        }

        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }

        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }

        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }

        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }

        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            background: #fcf4e3;
            border-left: 6px solid #f5b042;
        }

        .feedback-correct {
            background: #e1f5e8;
            border-left-color: #2b5e3b;
            color: #1f5a3a;
        }

        .feedback-wrong {
            background: #ffe6e5;
            border-left-color: #b3413a;
            color: #9b2f28;
        }

        .disabled-card {
            cursor: default;
            opacity: 0.7;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }

        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #2b5e3b;
        }

        .nav-btn.primary {
            background: #f5b042;
            color: #2d2b1a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .nav-btn.primary:hover {
            background: #e09d2c;
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }

        .result-panel.show {
            display: block;
        }

        .score-big {
            font-size: 2rem;
            font-weight: 800;
            color: #2b5e3b;
            margin-bottom: 12px;
        }

        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }

        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
            border-top: 1px solid #e2d5bc;
        }

        @media (max-width: 600px) {
            .quiz-content {
                padding: 28px 20px;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .answer-card {
                padding: 12px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>📖 Chapter 2 · Minority Groups</h1>
        <p>Bini • Itsekiri • Urhobo • Ijaw • Jukun • Tiv</p>
        <p style="font-size:0.85rem;">⚡ Tap an answer → immediate feedback shows correct answer. Then press Next.</p>
    </div>
    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="quiz-content" id="quizContent">
        <!-- dynamic -->
    </div>
    <footer>After answering each question, you'll see the correct answer instantly. 40 questions total.</footer>
</div>

<script>
    // ---------- 40 QUESTIONS (same as before) ----------
    const QUESTIONS = [
        { text: "Which European explorer arrived in Benin during the reign of Oba Ewuare in 1472?", options: ["Alfonso de Aviero", "Ruy de Sequeira", "Mungo Park", "John Cabot"], correct: "Ruy de Sequeira" },
        { text: "According to Igbafe’s version of Bini origin, what did the youngest child of Osanobua choose to take to the world?", options: ["Wealth", "Magical skills", "A snail shell", "A sword"], correct: "A snail shell" },
        { text: "The first period of pre‑colonial Bini history is known as the:", options: ["Eweka era", "Ogiso era", "Oba era", "Uzama era"], correct: "Ogiso era" },
        { text: "Who was the last Ogiso of Benin?", options: ["Ere", "Igbodo", "Owodo", "Oranmiyan"], correct: "Owodo" },
        { text: "In Bini society, the nobility class is called:", options: ["Ighiotu", "Adesotu", "Uzama only", "Ogbe"], correct: "Adesotu" },
        { text: "Which Ogiso is credited with forming the guild system in Benin?", options: ["Igbodo", "Ere", "Owodo", "Ekaladeran"], correct: "Ere" },
        { text: "Who established the Eweka dynasty in Benin?", options: ["Ekaladeran", "Oranmiyan (Omonoyan)", "Oba Ewuare", "Iginuwa"], correct: "Oranmiyan (Omonoyan)" },
        { text: "How many groups of title holders constituted the nobility (Adesotu) in Bini society?", options: ["Two", "Three", "Four", "Five"], correct: "Three" },
        { text: "Succession to the Benin throne was by:", options: ["Election by Uzama", "Primogeniture (first surviving son)", "Appointment by Oba", "Rotation among villages"], correct: "Primogeniture (first surviving son)" },
        { text: "The Oba of Benin was regarded as:", options: ["Only political head", "Only religious head", "Both civil and religious head", "Ceremonial figurehead"], correct: "Both civil and religious head" },
        { text: "Which class in Benin society was organized into professional guilds (carvers, brass-workers)?", options: ["Adesotu (nobility)", "Ighiotu (commoners)", "Uzama chiefs", "Palace chiefs"], correct: "Ighiotu (commoners)" },
        { text: "According to Benin tradition, what did the youngest child pour from the snail shell to form land?", options: ["Water", "Iron", "Sand", "Palm oil"], correct: "Sand" },
        { text: "The Itsekiri kingdom was established by:", options: ["Oba Olua", "Iginuwa (Ginuwa)", "Oba Ewuare", "Oranmiyan"], correct: "Iginuwa (Ginuwa)" },
        { text: "The traditional ruler of the Itsekiri is called:", options: ["Oba", "Olu", "Ovie", "Sarki"], correct: "Olu" },
        { text: "Itsekiri socio-political organization was modeled after which kingdom?", options: ["Oyo", "Benin", "Hausa states", "Igbo village system"], correct: "Benin" },
        { text: "Why was Iginuwa sent away from Benin to establish his own kingdom?", options: ["He rebelled", "He gave disastrous advice and became unpopular", "He wanted to spread Islam", "He lost a war"], correct: "He gave disastrous advice and became unpopular" },
        { text: "According to one version, the Urhobo people originated from which group?", options: ["Yoruba", "Ijaw", "Hausa", "Jukun"], correct: "Ijaw" },
        { text: "According to another version, the Urhobo people are product of immigrants from:", options: ["Benin", "Ife", "Igbo land", "Nupe"], correct: "Benin" },
        { text: "The traditional ruler of an Urhobo village is called:", options: ["Oba", "Olu", "Ovie", "Eze"], correct: "Ovie" },
        { text: "Like the Igbo, Urhobo adult males were divided into:", options: ["Royal lineages", "Age sets (youth, middle, elders)", "Guilds", "Warrior clans"], correct: "Age sets (youth, middle, elders)" },
        { text: "Are the Urhobo people concentrated in one homogeneous bloc or fragmented?", options: ["Homogeneous bloc", "Fragmented in different Niger Delta locations", "Only in one city", "Absent from Delta"], correct: "Fragmented in different Niger Delta locations" },
        { text: "The Urhobo traditional political institution headed by the Ovie was similar to that of:", options: ["Igbo acephalous system", "Benin Kingdom", "Hausa emirate", "Tiv segmentary system"], correct: "Benin Kingdom" },
        { text: "The Ijaw people are primarily found in which region?", options: ["Guinea Savanna", "Niger Delta", "North-Central Nigeria", "Sahel"], correct: "Niger Delta" },
        { text: "The Ijaw traditional political system is characterized by the:", options: ["Oba system", "House System", "Emirate system", "Age grade only"], correct: "House System" },
        { text: "Which of the following is a traditional major Ijaw state?", options: ["Kano", "Bonny", "Oyo", "Sokoto"], correct: "Bonny" },
        { text: "Why did the Ijaw not develop a centralized state?", options: ["They preferred monarchy", "Scattered small fishing settlements in creeks", "Influence of Islam", "Colonial interference"], correct: "Scattered small fishing settlements in creeks" },
        { text: "Which Ijaw state is known alongside Bonny, Kalabari and Opobo?", options: ["Brass-Nemba", "Warri", "Okrika", "Nembe"], correct: "Brass-Nemba" },
        { text: "According to the Kano Chronicle, the Jukun people raided Hausaland and Bornu during the:", options: ["12th–13th centuries", "14th–15th centuries", "16th–17th centuries", "18th–19th centuries"], correct: "16th–17th centuries" },
        { text: "The most authentic written source about Jukun history is:", options: ["Bornu Chronicle", "Kano Chronicle", "Yoruba Oriki", "Benin oral tradition"], correct: "Kano Chronicle" },
        { text: "The Jukun people were already in existence before which century?", options: ["14th", "15th", "16th", "17th"], correct: "16th" },
        { text: "The Jukun supreme deity is known as:", options: ["Aondo", "Shido or Chido", "Osanobua", "Soko"], correct: "Shido or Chido" },
        { text: "The Tiv people are the largest single ethnic group in which basin?", options: ["Lake Chad basin", "Middle Benue basin", "Niger Delta basin", "Sokoto basin"], correct: "Middle Benue basin" },
        { text: "According to Tiv oral tradition, the word 'Tiv' refers to both the language and the:", options: ["Supreme God", "Founding father", "Main river", "Sacred animal"], correct: "Founding father" },
        { text: "The largest recognized family group among the Tiv is called:", options: ["Mbavessen", "Tombor", "Ityough Kiteragh", "Swem"], correct: "Tombor" },
        { text: "The head of a Tiv family unit (elder) is called:", options: ["Oba", "Mbavessen", "Sarki", "Ovie"], correct: "Mbavessen" },
        { text: "In Tiv traditional belief, witchcraft is believed to be practiced by:", options: ["Only women", "Only men", "Both equally", "Only the elderly"], correct: "Only men" },
        { text: "Among the Nupe and Gwari, witches are almost invariably:", options: ["Men", "Women", "Children", "Chiefs"], correct: "Women" },
        { text: "What is the name of the Supreme God among the Tiv?", options: ["Aondo", "Soko", "Chukwu", "Osanobua"], correct: "Aondo" },
        { text: "Which ethnic group(s) constitute the 'West African yam belt' together with the Nupe and Koto?", options: ["Igbo", "Tiv", "Yoruba", "Ijaw"], correct: "Tiv" },
        { text: "According to Chapter 2, which region represents the 'best hope for religious tolerance' in Nigeria?", options: ["Rain Forest region", "Guinea Savanna region", "Niger Delta coastal zone", "Sahel region"], correct: "Guinea Savanna region" }
    ];

    const total = QUESTIONS.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);      // stores selected answer text
    let answerLocked = new Array(total).fill(false);   // prevents re-answering after feedback
    let quizFinished = false;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / total) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = QUESTIONS[currentIndex];
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const isAnswered = (selectedAnswer !== null);

        // Build answer cards
        const prefixLetters = ['A', 'B', 'C', 'D'];
        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let additionalClass = '';
            if (isLocked) {
                if (opt === q.correct) additionalClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) additionalClass = 'selected-wrong';
                else additionalClass = 'disabled-card';
            } else if (selectedAnswer === opt) {
                // temporary highlight (should not happen because we lock after answer)
                additionalClass = 'selected-correct';
            }
            cardsHtml += `
                <div class="answer-card ${additionalClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${prefixLetters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct! “${escapeHtml(selectedAnswer)}” is the right answer.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. You chose “${escapeHtml(selectedAnswer)}”. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked ? 'disabled style="opacity:0.5; pointer-events:none;"' : '';
        const isLast = (currentIndex === total-1);
        const nextOrSubmit = isLast ? 
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${total}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${total}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">
                ${cardsHtml}
            </div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.5;"' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        // attach answer click handlers only if not locked
        if (!isLocked) {
            const cards = document.querySelectorAll('.answer-card');
            cards.forEach(card => {
                card.addEventListener('click', (e) => {
                    if (answerLocked[currentIndex]) return;
                    const chosen = card.getAttribute('data-opt-value');
                    // record answer
                    userAnswers[currentIndex] = chosen;
                    answerLocked[currentIndex] = true;
                    // re-render to show feedback & lock
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        // attach navigation
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0 && !quizFinished) {
                    currentIndex--;
                    renderCurrent();
                }
            });
        }
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!answerLocked[currentIndex]) return; // must answer first
                if (currentIndex < total-1 && !quizFinished) {
                    currentIndex++;
                    renderCurrent();
                }
            });
        }
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', () => {
                if (!answerLocked[currentIndex]) {
                    alert("Please answer the current question before finishing.");
                    return;
                }
                finishQuiz();
            });
        }
    }

    function finishQuiz() {
        // compute final score
        let score = 0;
        let details = [];
        for (let i = 0; i < total; i++) {
            const correct = (userAnswers[i] === QUESTIONS[i].correct);
            if (correct) score++;
            details.push({
                num: i+1,
                text: QUESTIONS[i].text,
                user: userAnswers[i] || "(not answered)",
                correct: QUESTIONS[i].correct,
                isCorrect: correct
            });
        }
        const percent = Math.round((score / total) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You know the minority groups very well.";
        else if (percent >= 65) msg = "👍 Good effort! Review Bini origin and Tiv segments.";
        else if (percent >= 45) msg = "📘 Fair. Re‑read Jukun & Ijaw sections.";
        else msg = "📚 Study Chapter 2 again – focus on Benin, Itsekiri and Urhobo.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        const finalDisplay = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${total} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz</button>
                </div>
            </div>
        `;
        quizContainer.innerHTML = finalDisplay;
        quizFinished = true;
        const restart = document.getElementById('restartQuizBtn');
        if (restart) {
            restart.addEventListener('click', () => {
                resetQuiz();
            });
        }
    }

    function resetQuiz() {
        currentIndex = 0;
        userAnswers.fill(null);
        answerLocked.fill(false);
        quizFinished = false;
        renderCurrent();
        updateProgress();
    }

    function escapeHtml(str) { 
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // initial render
    renderCurrent();
    updateProgress();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.6 Quiz • Norms & Values • 30/60 Random • Randomized Options</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }
        .quiz-header h1 { font-size: 1.9rem; font-weight: 700; }
        .progress-container { background: #e0e7d9; height: 8px; }
        .progress-fill { background: #f5b042; height: 8px; width: 0%; transition: width 0.25s; }
        .quiz-content { padding: 40px 35px; }
        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }
        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
        }
        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }
        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }
        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }
        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }
        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .feedback-correct {
            background: #e1f5e8;
            border-left: 6px solid #2b5e3b;
            color: #1f5a3a;
        }
        .feedback-wrong {
            background: #ffe6e5;
            border-left: 6px solid #b3413a;
            color: #9b2f28;
        }
        .disabled-card { cursor: default; opacity: 0.7; }
        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }
        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #2b5e3b;
        }
        .nav-btn.primary { background: #f5b042; color: #2d2b1a; }
        .nav-btn.primary:hover:not(:disabled) { background: #e09d2c; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }
        .result-panel.show { display: block; }
        .score-big { font-size: 2rem; font-weight: 800; color: #2b5e3b; }
        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }
        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
        }
        @media (max-width: 600px) {
            .quiz-content { padding: 28px 20px; }
            .question-text { font-size: 1.3rem; }
            .answer-card { padding: 12px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>🇳🇬 Chapter 6 · Norms, Values & Citizenship</h1>
        <p>Bank of 60 questions • 30 random each time • Options randomized</p>
        <p style="font-size:0.85rem;">Refresh or click Restart for a new set</p>
    </div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on "Nigerian Peoples & Culture" – Chapter 6 (Individual Norms and Values)</footer>
</div>

<script>
    // ---------- QUESTION BANK: 60 questions for Chapter 6 ----------
    // Topics: norms vs values, Nigerian core values, ethnic norms, citizenship acquisition, civic responsibilities, etc.
    const QUESTION_BANK = [
        // Definitions and basic concepts (8 questions)
        { text: "What are 'norms' in a social context?", options: ["Fundamental beliefs about what is desirable", "Accepted standards or rules that prescribe behavior", "Legal statutes passed by government", "Religious commandments"], correct: "Accepted standards or rules that prescribe behavior" },
        { text: "What are 'values' in a social context?", options: ["Rules enforced by police", "Fundamental beliefs that guide what is desirable or morally right", "Customs that vary by region", "Economic principles of trade"], correct: "Fundamental beliefs that guide what is desirable or morally right" },
        { text: "Which of the following is an example of an explicit norm?", options: ["Queuing in public", "Respecting elders", "A law or regulation", "Maintaining personal space"], correct: "A law or regulation" },
        { text: "Which of the following is an example of an implicit norm?", options: ["Constitution", "Traffic law", "Custom and tradition", "Criminal code"], correct: "Custom and tradition" },
        { text: "The concept of 'norms and values' forms the backbone of any society by:", options: ["Enforcing strict punishments", "Guiding behavior and promoting cohesion", "Replacing religious institutions", "Encouraging individualism"], correct: "Guiding behavior and promoting cohesion" },
        { text: "Which of the following is NOT a common value upheld across cultures according to the chapter?", options: ["Honesty", "Integrity", "Respect for others", "Material wealth accumulation"], correct: "Material wealth accumulation" },
        { text: "Norms help to reduce uncertainty and facilitate social coordination by:", options: ["Setting clear expectations about appropriate behavior", "Eliminating all individual choices", "Mandating uniform dress codes", "Prohibiting all forms of disagreement"], correct: "Setting clear expectations about appropriate behavior" },
        { text: "Values serve as the basis for:", options: ["Evaluating actions, attitudes and behaviors", "Calculating economic profit", "Determining weather patterns", "Mapping geographical boundaries"], correct: "Evaluating actions, attitudes and behaviors" },

        // Core Nigerian norms and values (10 questions)
        { text: "One of the most important norms in many Nigerian ethnic groups is:", options: ["Respect for elders", "Competition among youth", "Isolation of women", "Disregard for visitors"], correct: "Respect for elders" },
        { text: "Elders are considered the custodians of what in Nigerian society?", options: ["Political power only", "Wisdom, culture, and tradition", "Military strength", "Foreign relations"], correct: "Wisdom, culture, and tradition" },
        { text: "Family in Nigerian society is considered the:", options: ["Foundation of social structure", "Least important institution", "Only religious body", "Primary economic unit only"], correct: "Foundation of social structure" },
        { text: "The extended family in Nigeria is crucial for maintaining:", options: ["Isolation from neighbors", "Social cohesion and mutual support", "Strict class divisions", "Political opposition"], correct: "Social cohesion and mutual support" },
        { text: "Hospitality in Nigerian culture is demonstrated by:", options: ["Charging visitors high fees", "Making guests feel welcome and well cared for", "Avoiding any contact with strangers", "Reporting visitors to authorities"], correct: "Making guests feel welcome and well cared for" },
        { text: "The traditional belief that 'a stranger is a friend' reflects which Nigerian value?", options: ["Competition", "Hospitality", "Individualism", "Rigidity"], correct: "Hospitality" },
        { text: "Nigerians often place the welfare of the community above the individual, especially in:", options: ["Urban business centers", "Rural settings with communal labor", "Government offices", "Private schools"], correct: "Rural settings with communal labor" },
        { text: "Which two religions are the dominant faiths in Nigeria alongside traditional religions?", options: ["Buddhism and Hinduism", "Islam and Christianity", "Judaism and Zoroastrianism", "Shinto and Taoism"], correct: "Islam and Christianity" },
        { text: "The popular phrase 'man must hustle' captures the Nigerian ethos of:", options: ["Laziness", "Striving and surviving against odds", "Corruption", "Foreign dependency"], correct: "Striving and surviving against odds" },
        { text: "Despite institutional challenges, which value remains cherished in interpersonal relationships?", options: ["Deceit", "Honesty and trustworthiness", "Aggression", "Isolation"], correct: "Honesty and trustworthiness" },

        // Ethnic specific norms (Yoruba, Igbo, Hausa-Fulani) – 10 questions
        { text: "The Yoruba of Southwestern Nigeria emphasize age, seniority, and:", options: ["Competitive individualism", "Communal values and respect", "Strict gender segregation", "Nomadic lifestyle"], correct: "Communal values and respect" },
        { text: "Yoruba traditional leadership includes kings known as:", options: ["Emirs", "Obas", "Ogisos", "Alkalai"], correct: "Obas" },
        { text: "Among the Yoruba, respectful greetings often involve:", options: ["Physical gestures and deferential language", "Avoiding eye contact", "Shouting loudly", "Silence"], correct: "Physical gestures and deferential language" },
        { text: "The Igbo of Southeastern Nigeria place high value on individual achievement and:", options: ["Self-reliance", "Absolute monarchy", "Foreign rule", "Collective farming only"], correct: "Self-reliance" },
        { text: "The Igbo concept of 'chi' refers to:", options: ["Village assembly", "Personal god emphasizing destiny and effort", "Religious sacrifice", "Harvest festival"], correct: "Personal god emphasizing destiny and effort" },
        { text: "Igbo traditional political structures are described as:", options: ["Centralized empires", "Democratic community structures with elders and town unions", "Feudal hierarchies", "Military dictatorships"], correct: "Democratic community structures with elders and town unions" },
        { text: "The Hausa-Fulani of Northern Nigeria are known for their structured societal hierarchy and strong:", options: ["Christian values", "Islamic values guided by Sharia", "Traditional animist practices", "Secular humanism"], correct: "Islamic values guided by Sharia" },
        { text: "Traditional leaders among the Hausa-Fulani such as Emirs play significant roles in:", options: ["Only religious matters", "Community governance and social behavior", "International trade", "Military conquest only"], correct: "Community governance and social behavior" },
        { text: "Polygamy among the Hausa-Fulani is:", options: ["Forbidden by all laws", "Culturally and religiously accepted within defined moral bounds", "Only for the poor", "Only for royalty"], correct: "Culturally and religiously accepted within defined moral bounds" },
        { text: "Among the Yoruba, the council of chiefs that checks the Oba's power includes the:", options: ["Oyomesi", "Uzama", "Tombor", "Ogboni only"], correct: "Oyomesi" },

        // Citizenship and acquisition (15 questions)
        { text: "The term 'citizen' etymologically derives from the Latin word 'civitas' meaning:", options: ["Freedom", "Membership of a society", "Voting right", "Tax payment"], correct: "Membership of a society" },
        { text: "In ancient Greece, citizens were those who belonged to the:", options: ["Slave class", "Ruling or aristocratic class", "Merchant class", "Foreign resident class"], correct: "Ruling or aristocratic class" },
        { text: "In ancient Athens, which group was considered incapable of reasoning and equated with inanimate objects?", options: ["Philosopher kings", "Guardians", "Proletariats and servants", "Warriors"], correct: "Proletariats and servants" },
        { text: "A citizen of a country is recognized by the fundamental laws and enjoys:", options: ["Only the right to vote", "Full rights and privileges provided by such laws", "Exemption from taxes", "Right to ignore all laws"], correct: "Full rights and privileges provided by such laws" },
        { text: "The 1789 Declaration of the Rights of Man was by which assembly?", options: ["American Congress", "French National Assembly", "British Parliament", "German Reichstag"], correct: "French National Assembly" },
        { text: "The 1776 American Declaration of Independence helped to universalize the concept of:", options: ["Monarchy", "Citizenship", "Slavery", "Colonialism"], correct: "Citizenship" },
        { text: "Citizenship is the totality of all rights and privileges accorded to members of a:", options: ["Family", "State", "Religious group", "Ethnic clan"], correct: "State" },
        { text: "Which term is often used interchangeably with 'citizenship' but relates to international law?", options: ["Residency", "Nationality", "Voter registration", "Tax status"], correct: "Nationality" },
        { text: "One way to acquire citizenship is by birth under the principle 'jus sanguinis', which means:", options: ["Law of the soil", "Law of blood (descent)", "Law of marriage", "Law of naturalization"], correct: "Law of blood (descent)" },
        { text: "A person born in Nigeria after independence either of whose parents is a Nigerian citizen is automatically:", options: ["A permanent resident", "A citizen of Nigeria", "A foreign national", "A stateless person"], correct: "A citizen of Nigeria" },
        { text: "The principle 'jus soli' means citizenship by:", options: ["Descent", "Place of birth (law of the land)", "Marriage", "Naturalization"], correct: "Place of birth (law of the land)" },
        { text: "Under US law, a person born in a registered ship becomes citizen of the state where the ship is:", options: ["Registered", "Built", "Docked", "Flagged"], correct: "Registered" },
        { text: "Naturalization is the process of acquiring citizenship:", options: ["By birth", "By legal process", "By inheritance", "By divine right"], correct: "By legal process" },
        { text: "In Nigeria, one requirement for naturalization is residency for a consecutive period of:", options: ["5 years", "10 years", "15 years", "20 years"], correct: "15 years" },
        { text: "Derivative naturalization occurs when a child or spouse acquires citizenship by virtue of:", options: ["Parents' or spouse's naturalization", "Birth on foreign soil", "Independent application", "Court order"], correct: "Parents' or spouse's naturalization" },

        // Termination of citizenship and civic responsibility (10 questions)
        { text: "A person can lose citizenship by marriage to another national; this is known as termination:", options: ["By expatriation", "By marriage", "By de-naturalization", "By renunciation"], correct: "By marriage" },
        { text: "De-naturalization refers to:", options: ["Voluntary renouncement", "Revocation or cancellation of previously granted citizenship", "Automatic loss at age 18", "Loss by marriage"], correct: "Revocation or cancellation of previously granted citizenship" },
        { text: "In Nigeria, a naturalized citizen can lose citizenship if within 7 years they are sentenced to imprisonment for more than:", options: ["1 year", "2 years", "3 years", "5 years"], correct: "3 years" },
        { text: "Expatriation as a method of termination means:", options: ["Involuntary removal", "Voluntary renouncement of citizenship status", "Loss by marriage", "Loss by crime"], correct: "Voluntary renouncement of citizenship status" },
        { text: "Civic responsibility encompasses the duties and obligations that citizens have towards their:", options: ["Society and government", "Only their family", "Foreign nations", "Religious institutions"], correct: "Society and government" },
        { text: "Which of the following is a civic duty?", options: ["Obeying the laws of the land", "Choosing a favorite sports team", "Traveling abroad", "Changing one's name"], correct: "Obeying the laws of the land" },
        { text: "Payment of taxes is considered a:", options: ["Optional contribution", "Civic duty", "Voluntary donation", "Religious tithe"], correct: "Civic duty" },
        { text: "Exercising voting rights is an example of a civic:", options: ["Duty", "Obligation (contributing to success of government)", "Privilege only", "Crime"], correct: "Obligation (contributing to success of government)" },
        { text: "Community engagement as a civic responsibility includes:", options: ["Isolation from neighbors", "Volunteering and participating in community development", "Avoiding public meetings", "Refusing to help others"], correct: "Volunteering and participating in community development" },
        { text: "Environmental stewardship as a civic responsibility means:", options: ["Ignoring pollution", "Taking care of the environment and natural resources", "Only planting trees", "Only recycling paper"], correct: "Taking care of the environment and natural resources" },

        // Additional mixed/conceptual (7 questions to reach 60)
        { text: "The kind of relationship between state and citizen where rights and duties are exchanged is called:", options: ["Quid pro quo", "Caveat emptor", "Modus vivendi", "Status quo"], correct: "Quid pro quo" },
        { text: "Moral rights are those which can be demonstrated as justifiable by relation to:", options: ["Legal statutes", "Common good whether recognized or not", "Government decree", "International treaties"], correct: "Common good whether recognized or not" },
        { text: "Legal rights are constitutional rights that are:", options: ["Optional to follow", "Documented, abided by all, and justiciable in court", "Only for the wealthy", "Temporary"], correct: "Documented, abided by all, and justiciable in court" },
        { text: "One of the fundamental human rights in Nigeria is:", options: ["Right to free housing", "Right to life", "Right to free travel abroad", "Right to unlimited wealth"], correct: "Right to life" },
        { text: "Duties include all EXCEPT:", options: ["Obedience to laws", "Payment of taxes", "Non-interference with others' rights", "Avoiding all forms of work"], correct: "Avoiding all forms of work" },
        { text: "Obligations include:", options: ["Exercising voting rights", "Paying no attention to government", "Breaking laws", "Leaving the country"], correct: "Exercising voting rights" },
        { text: "Promoting citizenship and civic responsibility is vital for:", options: ["Weakening democracy", "Functioning of democracy and development of a healthy society", "Creating dictatorships", "Encouraging anarchy"], correct: "Functioning of democracy and development of a healthy society" }
    ];

    // Ensure at least 60 questions (we have exactly 60 as built)
    console.assert(QUESTION_BANK.length === 60, `Question bank has ${QUESTION_BANK.length} questions, expected 60.`);

    // Helper: shuffle array (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Randomly select N distinct questions from bank
    function selectRandomQuestions(bank, count) {
        const shuffled = shuffleArray([...bank]);
        return shuffled.slice(0, count);
    }

    // For a given question, randomize the order of its options and update the correct answer accordingly
    function randomizeOptionsOrder(question) {
        const originalOptions = [...question.options];
        const correctAnswer = question.correct;
        let optList = originalOptions.map(opt => ({ text: opt, isCorrect: opt === correctAnswer }));
        // Shuffle
        for (let i = optList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optList[i], optList[j]] = [optList[j], optList[i]];
        }
        const newOptions = optList.map(item => item.text);
        const newCorrect = optList.find(item => item.isCorrect).text;
        return {
            text: question.text,
            options: newOptions,
            correct: newCorrect
        };
    }

    // Global quiz state
    let currentQuestions = [];        // array of question objects (after randomization)
    let currentIndex = 0;
    let userAnswers = [];
    let answerLocked = [];
    let quizFinished = false;
    const totalQuestionsSelected = 30;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / totalQuestionsSelected) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = currentQuestions[currentIndex];
        if (!q) return;
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let addClass = '';
            if (isLocked) {
                if (opt === q.correct) addClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) addClass = 'selected-wrong';
                else addClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${addClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${letters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === totalQuestionsSelected - 1);
        const nextOrSubmit = isLast ?
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${totalQuestionsSelected}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${totalQuestionsSelected}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">${cardsHtml}</div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        if (!isLocked) {
            document.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    userAnswers[currentIndex] = card.getAttribute('data-opt-value');
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.onclick = () => { if (currentIndex > 0 && !quizFinished) { currentIndex--; renderCurrent(); } };
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => { if (answerLocked[currentIndex] && currentIndex < totalQuestionsSelected-1 && !quizFinished) { currentIndex++; renderCurrent(); } };
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) submitBtn.onclick = () => { if (answerLocked[currentIndex]) finishQuiz(); else alert("Please answer first."); };
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < totalQuestionsSelected; i++) {
            const correct = (userAnswers[i] === currentQuestions[i].correct);
            if (correct) score++;
            details.push({
                num: i+1,
                text: currentQuestions[i].text,
                user: userAnswers[i] || "(no answer)",
                correct: currentQuestions[i].correct,
                isCorrect: correct
            });
        }
        const percent = Math.round((score / totalQuestionsSelected) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You have a strong grasp of Nigerian norms, values, and citizenship.";
        else if (percent >= 65) msg = "👍 Good. Review the differences between norms/values and the methods of citizenship acquisition.";
        else if (percent >= 45) msg = "📘 Fair. Focus on ethnic-specific values and the meaning of 'jus sanguinis' and 'jus soli'.";
        else msg = "📚 Re-read Chapter 6 carefully – definitions, core values, citizenship rules, and civic responsibilities.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...</td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}</td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}</td>
            </tr>`;
        }
        reviewHtml += `</table></div>`;

        quizContainer.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${totalQuestionsSelected} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz (New Random Set)</button>
                </div>
            </div>
        `;
        quizFinished = true;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            initNewQuiz();
        });
    }

    function initNewQuiz() {
        // Select 30 random questions from bank
        const rawSelected = selectRandomQuestions(QUESTION_BANK, 30);
        // For each selected question, randomize option order
        currentQuestions = rawSelected.map(q => randomizeOptionsOrder(q));
        currentIndex = 0;
        userAnswers = new Array(30).fill(null);
        answerLocked = new Array(30).fill(false);
        quizFinished = false;
        renderCurrent();
        updateProgress();
    }

    // Start the quiz
    initNewQuiz();
</script>

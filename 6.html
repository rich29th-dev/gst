        { text: "The Tiv people are found mainly in which state?", options: ["Taraba", "Benue", "Plateau", "Niger"], correct: "Benue" },
        { text: "According to Tiv tradition, the founding father Tiv came from:", options: ["Swem", "Egypt", "Bornu", "Sokoto"], correct: "Swem" },
        { text: "The Tiv refer to an elder as:", options: ["Tombor", "Mbavessen", "Ityough", "Kpav"], correct: "Mbavessen" },
        { text: "The Tiv migration to their present location occurred between which centuries?", options: ["14th-15th", "16th-17th", "18th-19th", "12th-13th"], correct: "16th-17th" },
        { text: "The Tiv are known for cultivating which crop as part of the 'West African yam belt'?", options: ["Cassava", "Yam", "Guinea corn", "Millet"], correct: "Yam" },
        { text: "Land ownership among the Tiv is:", options: ["Individual", "Community or lineage", "State controlled", "Royal property"], correct: "Community or lineage" },

        // Cross / Mixed from both chapters – 14 additional to reach 130
        { text: "Which ethnic group is known for the 'Onye Oji' system of apprenticeship?", options: ["Yoruba", "Igbo", "Hausa", "Bini"], correct: "Igbo" },
        { text: "The 'Guinea Savanna' region is described as representing the best hope for what in Nigeria?", options: ["Economic growth", "Religious tolerance", "Political stability", "Educational advancement"], correct: "Religious tolerance" },
        { text: "Which ethnic group's traditional religion includes deities such as Sango, Ogun, and Obatala?", options: ["Igbo", "Yoruba", "Hausa", "Bini"], correct: "Yoruba" },
        { text: "The 'West African yam belt' includes the Nupe, Koto, and which group?", options: ["Igbo", "Tiv", "Yoruba", "Ijaw"], correct: "Tiv" },
        { text: "The concept of 'Chi' as a personal god is found among which group?", options: ["Yoruba", "Igbo", "Hausa", "Bini"], correct: "Igbo" },
        { text: "Which group has the title 'Alaafin' for its king?", options: ["Ife", "Oyo", "Benin", "Igbo"], correct: "Oyo" },
        { text: "The 'Ogboni' society served as a check on royal power among the:", options: ["Igbo", "Yoruba", "Hausa", "Bini"], correct: "Yoruba" },
        { text: "The 'Uzama' title holders were part of which kingdom's nobility?", options: ["Oyo", "Benin", "Igbo", "Hausa"], correct: "Benin" },
        { text: "Which group's traditional political system is described as 'acephalous'?", options: ["Yoruba", "Igbo", "Hausa", "Bini"], correct: "Igbo" },
        { text: "The 'Sarki' was the ruler of which ethnic group?", options: ["Yoruba", "Hausa", "Igbo", "Bini"], correct: "Hausa" },
        { text: "The 'Olu' is the traditional ruler of which group?", options: ["Urhobo", "Itsekiri", "Ijaw", "Bini"], correct: "Itsekiri" },
        { text: "The 'Ovie' is the traditional ruler of which group?", options: ["Itsekiri", "Urhobo", "Ijaw", "Bini"], correct: "Urhobo" },
        { text: "The 'Ogiso' rulers belonged to which kingdom?", options: ["Oyo", "Benin", "Igbo", "Hausa"], correct: "Benin" },
        { text: "The 'Pulaaku' code of conduct is associated with which group?", options: ["Hausa", "Fulani", "Tuareg", "Kanuri"], correct: "Fulani" }
    ];

    // Ensure we have at least 130 questions
    console.assert(QUESTION_BANK.length >= 130, `Only ${QUESTION_BANK.length} questions, need 130`);
    // Trim to exactly 130 if more (should be exactly 130 as built)
    const FINAL_BANK = QUESTION_BANK.slice(0, 130);

    // Helper: shuffle array (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Randomly select N distinct questions from bank
    function selectRandomQuestions(bank, count) {
        const shuffled = shuffleArray([...bank]);
        return shuffled.slice(0, count);
    }

    // For a given question, randomize the order of its options and update correct accordingly
    function randomizeOptionsOrder(question) {
        const originalOptions = [...question.options];
        const correctAnswer = question.correct;
        // Create array of objects with option and a flag
        let optList = originalOptions.map(opt => ({ text: opt, isCorrect: opt === correctAnswer }));
        // Shuffle
        for (let i = optList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optList[i], optList[j]] = [optList[j], optList[i]];
        }
        const newOptions = optList.map(item => item.text);
        // Find new correct text
        const newCorrect = optList.find(item => item.isCorrect).text;
        return {
            text: question.text,
            options: newOptions,
            correct: newCorrect
        };
    }

    // Global quiz state
    let currentQuestions = [];        // array of question objects (after randomization)
    let currentIndex = 0;
    let userAnswers = [];
    let answerLocked = [];
    let quizFinished = false;
    let totalQuestionsSelected = 30;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / totalQuestionsSelected) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = currentQuestions[currentIndex];
        if (!q) return;
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let addClass = '';
            if (isLocked) {
                if (opt === q.correct) addClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) addClass = 'selected-wrong';
                else addClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${addClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${letters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === totalQuestionsSelected - 1);
        const nextOrSubmit = isLast ?
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${totalQuestionsSelected}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${totalQuestionsSelected}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">${cardsHtml}</div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        if (!isLocked) {
            document.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    userAnswers[currentIndex] = card.getAttribute('data-opt-value');
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.onclick = () => { if (currentIndex > 0 && !quizFinished) { currentIndex--; renderCurrent(); } };
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => { if (answerLocked[currentIndex] && currentIndex < totalQuestionsSelected-1 && !quizFinished) { currentIndex++; renderCurrent(); } };
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) submitBtn.onclick = () => { if (answerLocked[currentIndex]) finishQuiz(); else alert("Please answer first."); };
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < totalQuestionsSelected; i++) {
            const correct = (userAnswers[i] === currentQuestions[i].correct);
            if (correct) score++;
            details.push({
                num: i+1,
                text: currentQuestions[i].text,
                user: userAnswers[i] || "(no answer)",
                correct: currentQuestions[i].correct,
                isCorrect: correct
            });
        }
        const percent = Math.round((score / totalQuestionsSelected) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You know Nigeria's ethnic groups well.";
        else if (percent >= 65) msg = "👍 Good. Review the origin stories and political systems.";
        else if (percent >= 45) msg = "📘 Fair. Focus on the seven Hausa states, Yoruba checks, Igbo acephalous system, and minority groups.";
        else msg = "📚 Re-read Chapters 1 and 2 – pay attention to specific names, titles, and cultural details.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        quizContainer.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${totalQuestionsSelected} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz (New Random Set)</button>
                </div>
            </div>
        `;
        quizFinished = true;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            initNewQuiz();
        });
    }

    function initNewQuiz() {
        // Select 30 random questions from bank
        const rawSelected = selectRandomQuestions(FINAL_BANK, 30);
        // For each selected question, randomize option order
        currentQuestions = rawSelected.map(q => randomizeOptionsOrder(q));
        currentIndex = 0;
        userAnswers = new Array(30).fill(null);
        answerLocked = new Array(30).fill(false);
        quizFinished = false;
        renderCurrent();
        updateProgress();
    }

    // Start the quiz
    initNewQuiz();
</script>
</body>
</html>

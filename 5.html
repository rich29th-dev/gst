<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.5 • Apprenticeship • Fully Blended Options</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }
        .quiz-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
        }
        .progress-container {
            background: #e0e7d9;
            height: 8px;
        }
        .progress-fill {
            background: #f5b042;
            height: 8px;
            width: 0%;
            transition: width 0.25s;
        }
        .quiz-content {
            padding: 40px 35px;
        }
        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }
        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
        }
        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }
        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }
        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }
        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }
        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .feedback-correct {
            background: #e1f5e8;
            border-left: 6px solid #2b5e3b;
            color: #1f5a3a;
        }
        .feedback-wrong {
            background: #ffe6e5;
            border-left: 6px solid #b3413a;
            color: #9b2f28;
        }
        .disabled-card {
            cursor: default;
            opacity: 0.7;
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }
        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #2b5e3b;
        }
        .nav-btn.primary {
            background: #f5b042;
            color: #2d2b1a;
        }
        .nav-btn.primary:hover:not(:disabled) {
            background: #e09d2c;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }
        .result-panel.show {
            display: block;
        }
        .score-big {
            font-size: 2rem;
            font-weight: 800;
            color: #2b5e3b;
        }
        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }
        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
        }
        @media (max-width: 600px) {
            .quiz-content { padding: 28px 20px; }
            .question-text { font-size: 1.3rem; }
            .answer-card { padding: 12px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>🔧 Chapter 5 · Apprenticeship Systems</h1>
        <p>40 questions • No obvious keywords • One per page</p>
    </div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on Nigerian Peoples & Culture – Chapter 5</footer>
</div>

<script>
    // 40 questions with thoroughly neutral, non-hinting language
    const QUESTIONS = [
        { text: "What is the primary nature of indigenous apprenticeship systems in Nigeria?", options: ["Government-funded vocational training centers", "Community-based skill transfer arrangements", "Online certification programs", "Formal university degree courses"], correct: "Community-based skill transfer arrangements" },
        { text: "Which area is NOT typically covered by indigenous apprenticeship?", options: ["Building and furniture making", "Metal forging and tool production", "Garment sewing and design", "Computer coding and app development"], correct: "Computer coding and app development" },
        { text: "How is knowledge usually passed from one person to another in this system?", options: ["Through large classroom lectures", "By direct observation and supervised practice", "Via correspondence courses", "Through written manuals only"], correct: "By direct observation and supervised practice" },
        { text: "What is the usual time commitment for an apprentice to complete training?", options: ["A few weeks to several months", "Between three and ten years", "One to two years maximum", "A fixed period of five years"], correct: "Between three and ten years" },
        { text: "What is the main purpose of undergoing an apprenticeship?", options: ["To receive a formal academic degree", "To become capable of independent work and supporting a community", "To obtain a government employment certificate", "To qualify for overseas travel"], correct: "To become capable of independent work and supporting a community" },
        { text: "Which combination of learning is typical in these arrangements?", options: ["Theory and practical application together", "Only theoretical instruction", "Only practical demonstrations", "Only observation without any practice"], correct: "Theory and practical application together" },
        { text: "What are the usual costs for a person entering an apprenticeship?", options: ["High tuition fees paid annually", "Little or no money, sometimes just providing materials", "Mandatory payments to a national guild", "Subsidized loans from banks"], correct: "Little or no money, sometimes just providing materials" },
        { text: "What important function do these systems serve for local heritage?", options: ["They erase old customs and introduce new ones", "They maintain and continue traditional craft knowledge", "They replace local crafts with foreign imports", "They discourage any form of manual work"], correct: "They maintain and continue traditional craft knowledge" },
        { text: "What outcome does apprenticeship enable individuals to achieve?", options: ["Guaranteed lifelong government employment", "The ability to launch their own ventures or secure work", "Automatic political office", "Exemption from all taxes"], correct: "The ability to launch their own ventures or secure work" },
        { text: "What kind of infrastructure is NOT necessary for these systems to operate?", options: ["A skilled mentor", "A suitable workspace", "Large, expensive buildings", "Raw materials for practice"], correct: "Large, expensive buildings" },
        { text: "What two sets of abilities does apprenticeship often develop in a person?", options: ["Only manual dexterity", "Only financial accounting", "Craftsmanship and business operation skills", "Only customer service"], correct: "Craftsmanship and business operation skills" },
        { text: "What form of reliance does apprenticeship help reduce?", options: ["Reliance on family members only", "Reliance on religious institutions", "Reliance on government-provided jobs", "Reliance on international aid"], correct: "Reliance on government-provided jobs" },
        { text: "Which existing system leaves a gap that apprenticeship helps fill?", options: ["The informal street economy", "The formal schooling system", "The agricultural extension program", "The healthcare delivery system"], correct: "The formal schooling system" },
        { text: "What is one difficulty faced by these learning arrangements?", options: ["Too much government control", "Not enough rules, leading to possible unfair treatment", "Excessive funding from donors", "No young people interested in learning"], correct: "Not enough rules, leading to possible unfair treatment" },
        { text: "What is another limitation mentioned about these systems?", options: ["They ignore contemporary tools and methods", "They completely reject all tradition", "They focus only on digital skills", "They require university degrees to start"], correct: "They ignore contemporary tools and methods" },
        { text: "What external force is causing demand for some crafts to change?", options: ["Increased government subsidies", "Worldwide integration and city growth", "Decreased population", "New religious teachings"], correct: "Worldwide integration and city growth" },
        { text: "What resources do apprentices in remote areas often lack?", options: ["Food and housing", "Mentors and time", "Equipment, supplies, and startup money", "Electricity and roads"], correct: "Equipment, supplies, and startup money" },
        { text: "What pattern of inequality exists within these systems across Nigeria?", options: ["Men are completely forbidden from learning", "Women are sometimes limited to certain types of work", "Everyone has exactly the same opportunities", "Only elders are allowed to teach"], correct: "Women are sometimes limited to certain types of work" },
        { text: "What is the basis of the Yoruba approach to apprenticeship?", options: ["Farming and crop rotation", "Buying, selling, and commercial activities", "Fishing and boat handling", "Mining and mineral extraction"], correct: "Buying, selling, and commercial activities" },
        { text: "Besides technical know-how, what else do Yoruba apprentices learn?", options: ["Military strategies and combat", "Principles such as honesty, diligence, and deference", "Foreign languages and diplomacy", "Medical diagnosis and herbal remedies"], correct: "Principles such as honesty, diligence, and deference" },
        { text: "What is the typical length of a Yoruba apprenticeship?", options: ["Less than one year", "Three to seven years", "Eight to twelve years", "More than fifteen years"], correct: "Three to seven years" },
        { text: "What specific product line benefits greatly from Yoruba tailoring apprentices?", options: ["Car spare parts", "Traditional event outfits known as Aso Ebi", "Household electronics", "Pharmaceutical products"], correct: "Traditional event outfits known as Aso Ebi" },
        { text: "What fields of work does the Hausa/Fulani apprenticeship emphasize?", options: ["Information technology and coding", "Farming, handcrafts, and commerce", "Banking and financial services", "Aviation and logistics"], correct: "Farming, handcrafts, and commerce" },
        { text: "How does Islamic practice influence Hausa/Fulani apprenticeship?", options: ["It replaces all vocational training with religious study", "It combines religious learning with skill training", "It forbids any form of trade instruction", "It requires apprenticeship to occur only in mosques"], correct: "It combines religious learning with skill training" },
        { text: "What does the famous Kano market provide for apprentices?", options: ["A place to learn leather tanning only", "A center for learning trade operations, sourcing, selling, and client relations", "A site for fishing and boat building", "A hub for pharmaceutical manufacturing"], correct: "A center for learning trade operations, sourcing, selling, and client relations" },
        { text: "What is the Igbo apprenticeship system especially known for promoting?", options: ["Religious leadership and theology", "Business initiative and enterprise management", "Military service and defense tactics", "Agricultural innovation and crop science"], correct: "Business initiative and enterprise management" },
        { text: "What occurs in the 'Onye Oji' practice unique to the Igbo model?", options: ["The master sells the apprentice to another household", "The master gives the apprentice money or aid to start a business", "The apprentice must marry the master's daughter", "The apprentice is sent overseas for more training"], correct: "The master gives the apprentice money or aid to start a business" },
        { text: "What initial skills do Igbo apprentices typically acquire in merchandising?", options: ["Weaving and pottery making", "Product sourcing, pricing, and customer interaction", "Iron smelting and blacksmithing", "Herbal medicine preparation"], correct: "Product sourcing, pricing, and customer interaction" },
        { text: "What does palm oil production apprenticeship involve in rural Igbo areas?", options: ["Only harvesting the fruit", "Harvesting, processing, and selling the oil", "Only the processing stage", "Only the sales and marketing"], correct: "Harvesting, processing, and selling the oil" },
        { text: "What activities are Ibibio and Efik apprenticeship traditions mainly connected to?", options: ["Desert caravan trading", "Sea-related work, fishing, and vessel construction", "Mountain mining and quarrying", "Factory textile manufacturing"], correct: "Sea-related work, fishing, and vessel construction" },
        { text: "What handcraft skills do Ibibio and Efik apprentices learn?", options: ["Pottery, bead-making, and wood carving", "Computer programming and web design", "Automobile engine repair", "Chemical processing"], correct: "Pottery, bead-making, and wood carving" },
        { text: "What does fishing apprenticeship in Ibibio/Efik areas teach?", options: ["Deep sea oil drilling", "Fishing methods, boat building, and water commerce", "Aquarium maintenance", "Restaurant management"], correct: "Fishing methods, boat building, and water commerce" },
        { text: "What does apprenticeship do to encourage people to start new businesses?", options: ["It teaches only how to work for others", "It imparts both craft skills and business administration", "It focuses solely on avoiding competition", "It encourages reliance on government aid"], correct: "It imparts both craft skills and business administration" },
        { text: "Finishing an apprenticeship successfully improves a person's what?", options: ["Only their social standing", "Their economic position and ability to aid development", "Only their political connections", "Only their religious reputation"], correct: "Their economic position and ability to aid development" },
        { text: "How does apprenticeship address the problem of joblessness?", options: ["It promises a government job after completion", "It provides a different path to skill building and earning income", "It gives free relocation to cities", "It offers exemption from all taxes"], correct: "It provides a different path to skill building and earning income" },
        { text: "What kind of relationships does apprenticeship build within a community?", options: ["Competition and conflict", "Close social ties, networks, and mutual bonds", "Isolation from neighbors", "Dependence on foreigners"], correct: "Close social ties, networks, and mutual bonds" },
        { text: "What must policy makers and community leaders work together to achieve for these systems?", options: ["Keep them completely unchanged forever", "Help them become more inclusive and adapt to new technologies", "Replace them entirely with formal schools", "Focus only on old crafts and ignore new needs"], correct: "Help them become more inclusive and adapt to new technologies" },
        { text: "What broad purposes do apprenticeship systems serve across Nigeria's many ethnic groups?", options: ["Only for the three largest groups", "Economic survival, cultural continuity, and social unity", "Only for northern communities", "Only for coastal communities"], correct: "Economic survival, cultural continuity, and social unity" },
        { text: "What can happen when a master takes on too many learners at once?", options: ["The training quality improves", "Training becomes insufficient and the learners may be exploited", "Skills are learned faster", "Profits for learners increase"], correct: "Training becomes insufficient and the learners may be exploited" },
        { text: "What final statement does the chapter make about indigenous apprenticeship?", options: ["It should replace all modern education", "It remains crucial for Nigeria's economic growth and heritage protection", "It should encourage emigration to other countries", "It should eliminate all traditional crafts"], correct: "It remains crucial for Nigeria's economic growth and heritage protection" }
    ];

    const total = QUESTIONS.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);
    let answerLocked = new Array(total).fill(false);
    let quizFinished = false;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / total) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = QUESTIONS[currentIndex];
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let addClass = '';
            if (isLocked) {
                if (opt === q.correct) addClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) addClass = 'selected-wrong';
                else addClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${addClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${letters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === total-1);
        const nextOrSubmit = isLast ?
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${total}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${total}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">${cardsHtml}</div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        if (!isLocked) {
            document.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    userAnswers[currentIndex] = card.getAttribute('data-opt-value');
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.onclick = () => { if (currentIndex > 0 && !quizFinished) { currentIndex--; renderCurrent(); } };
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => { if (answerLocked[currentIndex] && currentIndex < total-1 && !quizFinished) { currentIndex++; renderCurrent(); } };
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) submitBtn.onclick = () => { if (answerLocked[currentIndex]) finishQuiz(); else alert("Please answer first."); };
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < total; i++) {
            const correct = (userAnswers[i] === QUESTIONS[i].correct);
            if (correct) score++;
            details.push({ num: i+1, text: QUESTIONS[i].text, user: userAnswers[i] || "(no answer)", correct: QUESTIONS[i].correct, isCorrect: correct });
        }
        const percent = Math.round((score / total) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You truly know the material.";
        else if (percent >= 65) msg = "👍 Good. Review the ethnic-specific systems and challenges.";
        else if (percent >= 45) msg = "📘 Fair. Focus on the 'Onye Oji' system and apprenticeship goals.";
        else msg = "📚 Re-read Chapter 5 carefully – pay attention to details about each ethnic group.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        quizContainer.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${total} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz</button>
                </div>
            </div>
        `;
        quizFinished = true;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            currentIndex = 0;
            userAnswers.fill(null);
            answerLocked.fill(false);
            quizFinished = false;
            renderCurrent();
            updateProgress();
        });
    }

    renderCurrent();
    updateProgress();
</script>
</body>
</html>

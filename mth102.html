<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTH 102 Quiz вАФ Revision 2025</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0d0f14;--surface:#161820;--card:#1e2130;--border:#2a2d3e;
    --accent:#6c63ff;--accent2:#ff6b6b;--success:#43e97b;--warning:#ffd166;
    --text:#e8e9f0;--muted:#7b7f99;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  .logo-badge{background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;padding:6px 12px;border-radius:6px;letter-spacing:.05em;}
  header h1{font-size:18px;font-weight:600;}
  header p{font-size:13px;color:var(--muted);margin-left:auto;}
  .view{display:none;} .view.active{display:block;}
  #home{padding:48px 32px;max-width:960px;margin:0 auto;}
  .home-hero{text-align:center;margin-bottom:56px;}
  .home-hero h2{font-size:40px;font-weight:700;line-height:1.2;margin-bottom:12px;}
  .home-hero h2 span{color:var(--accent);}
  .home-hero p{color:var(--muted);font-size:16px;}
  .topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .topic-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;overflow:hidden;}
  .topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc,var(--accent));opacity:0;transition:opacity .15s;}
  .topic-card:hover{transform:translateY(-3px);border-color:var(--tc,var(--accent));box-shadow:0 8px 32px rgba(108,99,255,.12);}
  .topic-card:hover::before{opacity:1;}
  .topic-icon{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-bottom:12px;}
  .topic-card h3{font-size:17px;font-weight:600;margin-bottom:6px;}
  .topic-card p{font-size:13px;color:var(--muted);margin-bottom:16px;}
  .topic-meta{display:flex;gap:8px;flex-wrap:wrap;}
  .badge{background:rgba(108,99,255,.15);color:var(--accent);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
  #topic-view{padding:40px 32px;max-width:960px;margin:0 auto;}
  .back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:14px;display:flex;align-items:center;gap:6px;margin-bottom:32px;transition:border-color .15s,color .15s;}
  .back-btn:hover{border-color:var(--accent);color:var(--text);}
  .topic-header{margin-bottom:32px;}
  .topic-header .eyebrow{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .topic-header h2{font-size:28px;font-weight:700;margin-bottom:6px;}
  .topic-header p{color:var(--muted);}
  .subparts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
  .subpart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:transform .15s,border-color .15s;text-align:center;}
  .subpart-card:hover{transform:translateY(-2px);border-color:var(--accent);}
  .subpart-num{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:8px;}
  .subpart-card h4{font-size:14px;font-weight:600;margin-bottom:4px;}
  .subpart-card p{font-size:12px;color:var(--muted);}
  .subpart-score{margin-top:10px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--success);display:none;}
  .subpart-score.visible{display:block;}
  #quiz-view{padding:32px;max-width:700px;margin:0 auto;}
  .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
  .quiz-title{font-size:15px;color:var(--muted);}
  .quiz-progress-text{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text);}
  .progress-bar-wrap{background:var(--border);border-radius:4px;height:4px;margin-bottom:32px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a18cff);border-radius:4px;transition:width .4s ease;}
  .question-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px;}
  .question-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:14px;}
  .question-text{font-size:17px;font-weight:500;line-height:1.55;margin-bottom:24px;}
  .options{display:flex;flex-direction:column;gap:10px;}
  .option-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:14px 18px;text-align:left;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:15px;display:flex;align-items:flex-start;gap:12px;transition:border-color .1s,background .1s;line-height:1.4;}
  .option-btn:not(.disabled):hover{border-color:var(--accent);background:rgba(108,99,255,.08);}
  .option-letter{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--muted);min-width:20px;padding-top:1px;flex-shrink:0;}
  .option-btn.correct{border-color:var(--success);background:rgba(67,233,123,.08);}
  .option-btn.correct .option-letter{color:var(--success);}
  .option-btn.wrong{border-color:var(--accent2);background:rgba(255,107,107,.08);}
  .option-btn.wrong .option-letter{color:var(--accent2);}
  .option-btn.disabled{cursor:default;pointer-events:none;}
  .feedback-box{display:none;border-radius:8px;padding:14px 18px;font-size:14px;margin-top:14px;}
  .feedback-box.show{display:block;}
  .feedback-box.correct-fb{background:rgba(67,233,123,.1);border:1px solid rgba(67,233,123,.3);color:var(--success);}
  .feedback-box.wrong-fb{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:var(--accent2);}
  .feedback-box strong{display:block;margin-bottom:4px;font-size:15px;}
  .next-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:14px 28px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;display:none;transition:opacity .15s,transform .15s;}
  .next-btn.visible{display:block;}
  .next-btn:hover{opacity:.9;transform:translateY(-1px);}
  #results-view{padding:48px 32px;max-width:700px;margin:0 auto;text-align:center;}
  .result-icon{font-size:60px;margin-bottom:16px;}
  .result-score{font-family:'JetBrains Mono',monospace;font-size:68px;font-weight:700;line-height:1;margin-bottom:8px;}
  .result-score.high{color:var(--success);}
  .result-score.mid{color:var(--warning);}
  .result-score.low{color:var(--accent2);}
  .result-label{font-size:20px;font-weight:600;margin-bottom:6px;}
  .result-sub{color:var(--muted);margin-bottom:36px;font-size:15px;}
  .stats-row{display:flex;gap:16px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
  .stat-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 20px;text-align:center;}
  .stat-chip .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;display:block;}
  .stat-chip .key{font-size:12px;color:var(--muted);margin-top:2px;}
  .stat-chip.green .val{color:var(--success);}
  .stat-chip.red .val{color:var(--accent2);}
  .result-breakdown{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:left;margin-bottom:32px;}
  .result-breakdown h3{font-size:13px;color:var(--muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:.08em;}
  .breakdown-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px;}
  .breakdown-item:last-child{border-bottom:none;}
  .breakdown-q{color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .breakdown-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .breakdown-dot.ok{background:var(--success);}
  .breakdown-dot.fail{background:var(--accent2);}
  .result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn-primary:hover{opacity:.85;}
  .btn-secondary{background:none;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px 24px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:border-color .15s;}
  .btn-secondary:hover{border-color:var(--accent);}
  @media(max-width:600px){header{padding:14px 16px;}#home,#topic-view,#quiz-view,#results-view{padding:24px 16px;}.home-hero h2{font-size:26px;}.question-text{font-size:15px;}}
</style>
</head>
<body>
<header>
  <div class="logo-badge">MTH 102</div>
  <h1>Revision Quiz</h1>
  <p>2025 Edition ¬Ј 174 Questions</p>
</header>

<div id="home" class="view active">
  <div class="home-hero">
    <h2>Test your <span>Mathematics</span> knowledge</h2>
    <p>Pick a topic, choose a subpart, and challenge yourself with 10 questions at a time.</p>
  </div>
  <div class="topics-grid" id="topics-grid"></div>
</div>

<div id="topic-view" class="view">
  <button class="back-btn" onclick="showHome()">вЖР Back to Topics</button>
  <div class="topic-header">
    <div class="eyebrow" id="tv-eyebrow">Topic</div>
    <h2 id="tv-title"></h2>
    <p id="tv-desc"></p>
  </div>
  <div class="subparts-grid" id="subparts-grid"></div>
</div>

<div id="quiz-view" class="view">
  <div class="quiz-header">
    <span class="quiz-title" id="quiz-label"></span>
    <span class="quiz-progress-text" id="quiz-progress"></span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <div class="question-card">
    <div class="question-num" id="q-num"></div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
    <div class="feedback-box" id="feedback"></div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question вЖТ</button>
</div>

<div id="results-view" class="view">
  <div class="result-icon" id="result-icon"></div>
  <div class="result-score" id="result-score"></div>
  <div class="result-label" id="result-label"></div>
  <div class="result-sub" id="result-sub"></div>
  <div class="stats-row">
    <div class="stat-chip green"><span class="val" id="stat-correct"></span><div class="key">Correct</div></div>
    <div class="stat-chip red"><span class="val" id="stat-wrong"></span><div class="key">Wrong</div></div>
    <div class="stat-chip"><span class="val" id="stat-total"></span><div class="key">Total</div></div>
  </div>
  <div class="result-breakdown" id="result-breakdown">
    <h3>Question Breakdown</h3>
    <div id="breakdown-list"></div>
  </div>
  <div class="result-actions">
    <button class="btn-primary" onclick="retryQuiz()">Retry This Set</button>
    <button class="btn-secondary" onclick="backToSubparts()">Choose Another Set</button>
    <button class="btn-secondary" onclick="showHome()">Back to Topics</button>
  </div>
</div>

<script>
// Q1-174 fully mapped from PDF, grouped by topic & subpart of 10
const topics = [
  {
    id:"functions", icon:"f(x)", title:"Functions & Relations",
    desc:"Domain, range, mappings, types of functions, evaluating functions",
    color:"#6c63ff",
    subparts:[
      { label:"Part A", title:"Evaluating Functions",
        questions:[
          {q:"If f(x) = 15x вИТ 7, find f(8) вИТ f(вИТ5)", o:["81","56","37","195"], c:3},
          {q:"Given that f(x) = x¬≤ вИТ 7x + 5, find f(3)", o:["7","14","вИТ7","вИТ14"], c:2},
          {q:"Given that f(x) = x¬≥ вИТ 7x¬≤ вИТ 3, find f(вИТ3)", o:["7","14","вИТ7","вИТ14"], c:2},
          {q:"Evaluate f(x) = 5x вИТ 3 for x = вИТ7", o:["32","18","вИТ38","вИТ32"], c:2},
          {q:"If f(x) = 3x¬≥ + 2x¬≤ вИТ 7x вИТ 6, find f(вИТ3)", o:["12","24","48","36"], c:2},
          {q:"Evaluate f(x) = 8x вИТ 6 for x = вИТ7", o:["вИТ62","50","61","58"], c:0},
          {q:"If f(x) = 2x¬≥ вИТ 3x¬≤ + 7x вИТ 5, find f(вИТ2)", o:["вИТ36","47","вИТ47","36"], c:2},
          {q:"If f(x) = x¬≤, what is f(3)?", o:["6","9","12","15"], c:1},
          {q:"If f(x) = 5x, what is f(3)?", o:["8","10","15","18"], c:2},
          {q:"If f(x) = x¬≤ вИТ 2x + 1, find f(1)", o:["0","1","2","вИТ1"], c:0},
        ]
      },
      { label:"Part B", title:"Domain & Range",
        questions:[
          {q:"A domain is a list of all the ___ values of a relation or function", o:["X","Y","Z","odd"], c:0},
          {q:"What is the domain of this function: (0,1),(2,3),(вИТ1,3),(4,5)?", o:["{0,2,вИТ1,4}","{3}","{0,2}","{1,3,5}"], c:0},
          {q:"The x values of the ordered pair is called:", o:["Range","Relation","Domain","Function"], c:2},
          {q:"What is the range of this function: (вИТ3,вИТ2),(5,0),(0,1),(вИТ1,4),(4,5),(2,5)?", o:["(вИТ3,0,4,5)","(вИТ5,вИТ2,0,1,4,5)","(вИТ3,вИТ1,0,2,4,5)","(вИТ2,0,1,вИТ5,4)"], c:3},
          {q:"The domain of a function is:", o:["The set of outputs","The y-values","The set of inputs","The maximum value"], c:2},
          {q:"The range of a function is:", o:["The x-values","The set of all possible outputs","The domain","The variables"], c:1},
          {q:"What is the domain of f(x) = 1/x?", o:["All real numbers except 0","x > 0","x < 0","All real numbers"], c:0},
          {q:"What is the range of f(x) = x¬≤ for x вИИ вДЭ?", o:["вДЭ","x вЙ• 0","x вЙ§ 0","x вЙ† 0"], c:1},
          {q:"What is the domain of f(x) = вИЪ(x вИТ 1)?", o:["x вЙ• 1","x вЙ§ 1","x > 1","x вЙ† 1"], c:0},
          {q:"Domain of f(x) = 1/вИЪ(x вИТ 4):", o:["x вЙ• 4","x > 4","x вЙ§ 4","x < 4"], c:1},
        ]
      },
      { label:"Part C", title:"Types of Mappings",
        questions:[
          {q:"Which of this is not a type of mapping?", o:["One to one","Many to many","Zero to many","One to many"], c:2},
          {q:"Which of the following is a function?", o:["{(3,7),(3,6),(5,3)}","{(1,2),(вИТ1,3),(вИТ1,8)}","{(1,2),(2,2),(3,4)}","{(1,1),(1,2),(1,3)}"], c:2},
          {q:"A mapping in which every object in the domain has a unique image in the codomain is called:", o:["One to many","Many to many","One to one","Many to one"], c:2},
          {q:"Which of the following is a function?", o:["{(2,7),(3,7),(2,8)}","{(a,1),(a,2),(a,3)}","{(1,2),(вИТ1,3),(вИТ1,8)}","{(a,2),(b,3),(c,1)}"], c:3},
          {q:"A relation that maps every input to a unique output is called:", o:["Onto mapping","One to many mapping","Many to one mapping","One to one mapping"], c:3},
          {q:"A relation where the domain is a set of individual points is referred to as:", o:["Continuous relation","Discrete relation","Orthogonal relation","Diagonal relation"], c:1},
          {q:"A relation that every output has an input is called:", o:["One to one mapping","One to many mapping","Onto mapping","Many to one mapping"], c:3},
          {q:"Which of the following is a function? A.{(1,2),(2,3),(1,4)} B.{(2,3),(3,4),(4,5)} C.{(1,2),(2,2),(2,3)} D.{(5,6),(6,5),(5,7)}", o:["{(1,2),(2,3),(1,4)}","{(2,3),(3,4),(4,5)}","{(1,2),(2,2),(2,3)}","{(5,6),(6,5),(5,7)}"], c:1},
          {q:"Which of these is not a function? A. y = x + 2  B. y = вИЪx  C. x = y¬≤  D. y = |x|", o:["y = x + 2","y = вИЪx","x = y¬≤","y = |x|"], c:2},
          {q:"Function is best defined as:", o:["Any formula","A set of inputs","A relation with one output per input","A graph"], c:2},
        ]
      },
      { label:"Part D", title:"Composition & Inverses",
        questions:[
          {q:"Find the inverse of the function f(x) = 2x вИТ 3", o:["(x+3)/2","(xвИТ3)/2","5x вИТ 2","(3x+2)/3"], c:0},
          {q:"What is the inverse of f(x) = 2x + 3?", o:["x = 2y + 3","y = (x вИТ 3)/2","y = (x + 3)/2","y = 2x вИТ 3"], c:1},
          {q:"The inverse of f(x) = x/2 is:", o:["x/2","2x","x¬≤","x + 2"], c:1},
          {q:"If f(x) = 2x + 1 and g(x) = x вИТ 3, what is f(g(x))?", o:["2x вИТ 5","2x + 1","2x вИТ 1","2x вИТ 3"], c:0},
          {q:"What is g(f(x)) if f(x) = x + 1 and g(x) = x¬≤?", o:["x¬≤ + 1","x¬≤ + 2","(x + 1)¬≤","x¬≤ вИТ 1"], c:2},
          {q:"Which of these is the composition (f вИШ g)(x)?", o:["f(x) √Ч g(x)","f(g(x))","g(f(x))","f(x) + g(x)"], c:1},
          {q:"If f(x) = x вИТ 2 and g(x) = 3x, what is (f вИШ g)(x)?", o:["3x вИТ 2","3x вИТ 6","x вИТ 6","x вИТ 2"], c:1},
          {q:"If f(x) = x¬≤ and g(x) = x + 2, find (f вИШ g)(x)", o:["x¬≤ + 2","(x + 2)¬≤","x + 4","x¬≤ + 4"], c:1},
          {q:"What is f(g(1)) if f(x) = x¬≤ and g(x) = x + 3?", o:["4","16","9","25"], c:1},
          {q:"If f(x) = x + 3 and g(x) = 2x, what is f(g(2))?", o:["6","7","8","9"], c:1},
        ]
      },
      { label:"Part E", title:"Function Properties",
        questions:[
          {q:"The graph of a function passes the:", o:["Horizontal Line Test","Vertical Line Test","Slant Test","Derivative Test"], c:1},
          {q:"Which function is even?", o:["f(x) = x","f(x) = x¬≥","f(x) = x¬≤","f(x) = x + 1"], c:2},
          {q:"An odd function satisfies:", o:["f(x) = f(вИТx)","f(вИТx) = вИТf(x)","f(x) = x¬≤","f(вИТx) = f(x)"], c:1},
          {q:"F(x) = x¬≥ is:", o:["Even","Odd","Neither","Periodic"], c:1},
          {q:"Which of the following is one-to-one?", o:["y = x¬≤","y = |x|","y = 2x + 1","y = x¬≤ вИТ 4"], c:2},
          {q:"Which of these is not one-to-one?", o:["f(x) = x + 1","f(x) = x¬≥","f(x) = вИЪx","f(x) = x¬≤"], c:3},
          {q:"A function f is injective if:", o:["Every x has one y","Every y has one x","Different inputs yield different outputs","Not defined at x = 0"], c:2},
          {q:"A function f is surjective if:", o:["Every x has one y","Every y has one x","The range = codomain","f(0) = 0"], c:2},
          {q:"The identity function is:", o:["f(x) = x¬≤","f(x) = x","f(x) = 1/x","f(x) = 0"], c:1},
          {q:"A function is onto if:", o:["Each input maps to a unique output","Each output has a pre-image","It is linear","It is one-to-one"], c:1},
        ]
      },
      { label:"Part F", title:"More Function Evaluations",
        questions:[
          {q:"What is f(f(x)) if f(x) = x + 1?", o:["x + 1","x + 2","x + 3","x"], c:1},
          {q:"What is f(f(1)) if f(x) = 2x?", o:["4","2","1","8"], c:0},
          {q:"What is the result of (f + g)(x) if f(x) = 2x and g(x) = x + 3?", o:["3x + 3","3x","x + 3","2x + x + 3"], c:0},
          {q:"What is f(2) if f(x) = (x вИТ 1)¬≤?", o:["0","1","2","3"], c:1},
          {q:"What is f(2) if f(x) = x¬≤ вИТ 4x + 3?", o:["0","1","2","3"], c:1},
          {q:"What is the output of f(x) = x¬≥ when x = вИТ2?", o:["вИТ6","вИТ4","вИТ8","8"], c:2},
          {q:"If f(x) = 4 вИТ x, what is f(1)?", o:["3","2","5","1"], c:0},
          {q:"What is f(3) if f(x) = x¬≤ + 2x?", o:["15","12","13","14"], c:0},
          {q:"What is the value of f(2) + f(3) if f(x) = x¬≤?", o:["12","13","14","15"], c:1},
          {q:"What is f(4) if f(x) = 3x вИТ 2?", o:["10","9","11","12"], c:0},
        ]
      },
      { label:"Part G", title:"Domain & Range Advanced",

let currentTopicIdx=null, currentSubpartIdx=0, currentQuestions=[], currentQIdx=0, score=0, answers=[], answered=false;
const scoreStore={};

function init(){
  const grid=document.getElementById('topics-grid');
  grid.innerHTML='';
  topics.forEach((t,ti)=>{
    const total=t.subparts.reduce((s,p)=>s+p.questions.length,0);
    const card=document.createElement('div');
    card.className='topic-card';
    card.style.setProperty('--tc',t.color);
    card.innerHTML=`<div class="topic-icon" style="color:${t.color}">${t.icon}</div><h3>${t.title}</h3><p>${t.desc}</p><div class="topic-meta"><span class="badge" style="background:${t.color}22;color:${t.color}">${t.subparts.length} parts</span><span class="badge" style="background:${t.color}22;color:${t.color}">${total} questions</span></div>`;
    card.onclick=()=>showTopic(ti);
    grid.appendChild(card);
  });
}

function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showHome(){showView('home');}

function showTopic(ti){
  currentTopicIdx=ti;
  const t=topics[ti];
  document.getElementById('tv-eyebrow').textContent='Topic '+(ti+1);
  document.getElementById('tv-title').textContent=t.title;
  document.getElementById('tv-desc').textContent=t.desc;
  const grid=document.getElementById('subparts-grid');
  grid.innerHTML='';
  t.subparts.forEach((sp,si)=>{
    const key=t.id+'_'+si;
    const stored=scoreStore[key];
    const card=document.createElement('div');
    card.className='subpart-card';
    card.innerHTML=`<div class="subpart-num" style="color:${t.color}">${si+1}</div><h4>${sp.label}: ${sp.title}</h4><p>${sp.questions.length} questions</p><div class="subpart-score ${stored?'visible':''}" id="ss_${key}">${stored?stored.score+'/'+stored.total+' last attempt':''}</div>`;
    card.onclick=()=>startQuiz(si);
    grid.appendChild(card);
  });
  showView('topic-view');
}

function backToSubparts(){showTopic(currentTopicIdx);}

function startQuiz(si){
  currentSubpartIdx=si;
  const sp=topics[currentTopicIdx].subparts[si];
  currentQuestions=[...sp.questions];
  currentQIdx=0; score=0; answers=[]; answered=false;
  document.getElementById('quiz-label').textContent=topics[currentTopicIdx].title+' ¬Ј '+sp.label;
  showView('quiz-view');
  renderQuestion();
}

function renderQuestion(){
  const q=currentQuestions[currentQIdx];
  const total=currentQuestions.length;
  answered=false;
  document.getElementById('q-num').textContent='Question '+(currentQIdx+1)+' of '+total;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('quiz-progress').textContent=(currentQIdx+1)+' / '+total;
  document.getElementById('progress-fill').style.width=(currentQIdx/total*100)+'%';
  const fb=document.getElementById('feedback');
  fb.className='feedback-box'; fb.innerHTML='';
  const nb=document.getElementById('next-btn');
  nb.classList.remove('visible');
  nb.textContent=currentQIdx<total-1?'Next Question вЖТ':'See Results';
  const opts=document.getElementById('q-options');
  opts.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-letter">${letter}</span><span>${q.o[i]}</span>`;
    btn.onclick=()=>selectAnswer(i);
    opts.appendChild(btn);
  });
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=currentQuestions[currentQIdx];
  const ok=idx===q.c;
  const letters=['A','B','C','D'];
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    btn.classList.add('disabled');
    if(i===q.c)btn.classList.add('correct');
    if(i===idx&&!ok)btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  if(ok){score++;fb.className='feedback-box correct-fb show';fb.innerHTML='<strong>вЬУ Correct!</strong>';}
  else{fb.className='feedback-box wrong-fb show';fb.innerHTML=`<strong>вЬЧ Incorrect</strong>The correct answer is <strong>${letters[q.c]}. ${q.o[q.c]}</strong>`;}
  answers.push({correct:ok,selectedIdx:idx,correctIdx:q.c,questionText:q.q,correctText:q.o[q.c]});
  document.getElementById('next-btn').classList.add('visible');
}

function nextQuestion(){
  currentQIdx++;
  if(currentQIdx>=currentQuestions.length)showResults();
  else renderQuestion();
}

function showResults(){
  const total=currentQuestions.length;
  const pct=Math.round(score/total*100);
  document.getElementById('progress-fill').style.width='100%';
  const key=topics[currentTopicIdx].id+'_'+currentSubpartIdx;
  scoreStore[key]={score,total};
  const ssEl=document.getElementById('ss_'+key);
  if(ssEl){ssEl.textContent=score+'/'+total+' last attempt';ssEl.classList.add('visible');}
  const scoreEl=document.getElementById('result-score');
  scoreEl.textContent=pct+'%';
  scoreEl.className='result-score '+(pct>=80?'high':pct>=50?'mid':'low');
  let icon,label,sub;
  if(pct>=90){icon='рЯПЖ';label='Outstanding!';sub='Near-perfect score. You really know this material.';}
  else if(pct>=75){icon='вЬЕ';label='Great Work!';sub='Solid performance. A quick review of missed questions and you\'re set.';}
  else if(pct>=50){icon='рЯУЦ';label='Keep Studying';sub='You\'re getting there. Review the answers below and try again.';}
  else{icon='рЯТ™';label='More Practice Needed';sub='Don\'t give up! Go through the correct answers and try again.';}
  document.getElementById('result-icon').textContent=icon;
  document.getElementById('result-label').textContent=label;
  document.getElementById('result-sub').textContent=sub;
  document.getElementById('stat-correct').textContent=score;
  document.getElementById('stat-wrong').textContent=total-score;
  document.getElementById('stat-total').textContent=total;
  const list=document.getElementById('breakdown-list');
  list.innerHTML='';
  answers.forEach((a,i)=>{
    const row=document.createElement('div');
    row.className='breakdown-item';
    const shortQ=a.questionText.length>65?a.questionText.substring(0,65)+'вА¶':a.questionText;
    row.innerHTML=`<span class="breakdown-q">Q${i+1}: ${shortQ}</span><span class="breakdown-dot ${a.correct?'ok':'fail'}" title="${a.correct?'Correct':'Wrong вАФ Correct: '+a.correctText}"></span>`;
    list.appendChild(row);
  });
  showView('results-view');
}

function retryQuiz(){startQuiz(currentSubpartIdx);}
init();
</script>

</html>

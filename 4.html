<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.4 Quiz • Cultism, Kidnapping & Armed Banditry • One per page • Instant Feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }

        .quiz-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .quiz-header p {
            margin-top: 8px;
            opacity: 0.85;
            font-weight: 500;
        }

        .progress-container {
            background: #e0e7d9;
            height: 8px;
            width: 100%;
        }

        .progress-fill {
            background: #f5b042;
            height: 8px;
            width: 0%;
            transition: width 0.25s ease;
        }

        .quiz-content {
            padding: 40px 35px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }

        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }

        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
            transform: scale(1.01);
        }

        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }

        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }

        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }

        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }

        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            background: #fcf4e3;
            border-left: 6px solid #f5b042;
        }

        .feedback-correct {
            background: #e1f5e8;
            border-left-color: #2b5e3b;
            color: #1f5a3a;
        }

        .feedback-wrong {
            background: #ffe6e5;
            border-left-color: #b3413a;
            color: #9b2f28;
        }

        .disabled-card {
            cursor: default;
            opacity: 0.7;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }

        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            color: #2b5e3b;
        }

        .nav-btn.primary {
            background: #f5b042;
            color: #2d2b1a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .nav-btn.primary:hover:not(:disabled) {
            background: #e09d2c;
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }

        .result-panel.show {
            display: block;
        }

        .score-big {
            font-size: 2rem;
            font-weight: 800;
            color: #2b5e3b;
            margin-bottom: 12px;
        }

        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }

        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
            border-top: 1px solid #e2d5bc;
        }

        @media (max-width: 600px) {
            .quiz-content {
                padding: 28px 20px;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .answer-card {
                padding: 12px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>⚠️ Chapter 4 · Cultism, Kidnapping & Armed Banditry</h1>
        <p>Definitions • History • Types • Causes • Economic & Social Implications</p>
        <p style="font-size:0.85rem;">⚡ Tap an answer → immediate feedback shows correct answer. 40 questions.</p>
    </div>
    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on "Nigerian Peoples & Culture" – Chapter 4 (Cultism, Kidnapping, Armed Banditry)</footer>
</div>

<script>
    // ---------- 40 QUESTIONS for Chapter 4 (Cultism, Kidnapping, Armed Banditry) ----------
    const QUESTIONS = [
        // Cultism (1-12)
        { text: "A 'cult' is defined as a group of individuals who have a deep and partisan belief about some idea which ends up promoting and preserving their collective interest, and they are NOT primarily a:", options: ["Political party", "Religious group", "Social club", "Economic cooperative"], correct: "Religious group" },
        { text: "Secret cults are often referred to as 'secret' because:", options: ["They have no name", "Their principles and mode of operation are not open to the public", "They only meet at night", "They are illegal"], correct: "Their principles and mode of operation are not open to the public" },
        { text: "Membership of a cult typically involves:", options: ["Payment of a fee only", "Standard rituals to test qualification and readiness", "Writing an exam", "A public declaration"], correct: "Standard rituals to test qualification and readiness" },
        { text: "The history of cultism in Nigeria dates back to:", options: ["The early 1960s", "The late 1960s", "The 1970s", "The 1980s"], correct: "The late 1960s" },
        { text: "The founding fathers of cultism in Nigeria were originally:", options: ["Politicians", "Military officers", "Undergraduates (university students)", "Secondary school students"], correct: "Undergraduates (university students)" },
        { text: "The original purpose of the first cult in Nigeria was to:", options: ["Fight the government", "Resist victimization, intimidation, harassment, and oppression especially from lecturers", "Promote religious activities", "Engage in robbery"], correct: "Resist victimization, intimidation, harassment, and oppression especially from lecturers" },
        { text: "The founding fathers of cultism were known to be:", options: ["Weak students", "Brilliant and intelligent students", "Athletes", "Musicians"], correct: "Brilliant and intelligent students" },
        { text: "The first cult established in Nigeria originally promoted:", options: ["Violence", "Intellectualism, foresight, and character", "Political power", "Wealth accumulation"], correct: "Intellectualism, foresight, and character" },
        { text: "Cultism began to derail when:", options: ["The government banned it", "Disillusioned members broke away and formed their own, corrupting the original vision", "The founding fathers died", "Schools closed"], correct: "Disillusioned members broke away and formed their own, corrupting the original vision" },
        { text: "A common event among various cult groups in Nigeria became:", options: ["Collaboration", "Rivalry and reckless violence", "Peaceful dialogue", "Sports competitions"], correct: "Rivalry and reckless violence" },
        { text: "According to analysts, one reason for the derailment of cultism was:", options: ["Too much government regulation", "Initiation of members who had nothing to do with scholarship or intellectualism", "Lack of funding", "Foreign influence"], correct: "Initiation of members who had nothing to do with scholarship or intellectualism" },
        { text: "The founding fathers of cultism in Nigeria have contended that present-day cultism is:", options: ["Exactly what they wanted", "Better than before", "Not what they had in mind", "More intellectual"], correct: "Not what they had in mind" },
        // Evil of Cultism (13-16)
        { text: "Becoming a member of a secret cult today is akin to belonging to a:", options: ["Religious organization", "Kill squad and anti-social enterprise", "Charity group", "Political party"], correct: "Kill squad and anti-social enterprise" },
        { text: "Students who join cults often find themselves more engulfed with:", options: ["Their academics", "Activities of the group than their academics", "Sports", "Volunteer work"], correct: "Activities of the group than their academics" },
        { text: "Membership of cultism in Nigeria is generally:", options: ["Encouraged by families", "Forbidden by the family and society", "Supported by the government", "Legal"], correct: "Forbidden by the family and society" },
        { text: "Secret cults meet regularly to:", options: ["Study the Bible", "Discuss the situation of their body and plan next steps", "Pray", "Play games"], correct: "Discuss the situation of their body and plan next steps" },
        // Kidnapping (17-30)
        { text: "The word 'kidnap' can be referred to as a situation where someone is forcefully, without consent, and illegally taken to:", options: ["A police station", "An undisclosed location other than where they planned to go", "Another country", "A hospital"], correct: "An undisclosed location other than where they planned to go" },
        { text: "Kidnapping is NOT the same as an arrest because:", options: ["Arrest is always illegal", "An arrest can be forceful yet legal as stipulated by laws", "Kidnapping involves only children", "Arrest requires a warrant"], correct: "An arrest can be forceful yet legal as stipulated by laws" },
        { text: "Those who engage in kidnapping are called:", options: ["Kidnappees", "Kidnappers", "Abductors general", "Captors"], correct: "Kidnappers" },
        { text: "The most common type of kidnapping mentioned in the chapter is:", options: ["Kidnapping for ritual purposes", "Kidnapping for political reasons", "Kidnapping for ransom", "Kidnapping for making loud statements"], correct: "Kidnapping for ransom" },
        { text: "Kidnapping for ransom involves the victim being released only when:", options: ["The police intervene", "The agreed ransom is paid by families, friends, or associates", "The victim escapes", "A court order is issued"], correct: "The agreed ransom is paid by families, friends, or associates" },
        { text: "According to the chapter, some kidnap victims die in captivity due to:", options: ["Old age", "Inability to keep pace with captors, harsh treatment, or lack of medication", "Natural causes", "Suicide"], correct: "Inability to keep pace with captors, harsh treatment, or lack of medication" },
        { text: "Investigations reveal that most kidnap cases are the handiwork of:", options: ["Lone criminals", "Well-organized syndicates with network of members", "Foreign agents", "Government officials"], correct: "Well-organized syndicates with network of members" },
        { text: "The chapter speculates that even local/ordinary artisans may be part of:", options: ["The police force", "The chattel (network of kidnappers)", "Religious groups", "Educational institutions"], correct: "The chattel (network of kidnappers)" },
        { text: "Kidnapping for ritual purposes, political reasons, and making loud statements are examples of:", options: ["Kidnapping for ransom", "Kidnapping for other purposes", "Justifiable kidnapping", "Legal detention"], correct: "Kidnapping for other purposes" },
        { text: "The brutality of kidnappers stems from the fact that they want to:", options: ["Show mercy", "Tell the world that they mean business and are out for blood", "Negotiate peacefully", "Avoid attention"], correct: "Tell the world that they mean business and are out for blood" },
        { text: "Kidnapping has led to foreign investors withdrawing from Nigeria because:", options: ["The economy is weak", "Their personal safety cannot be guaranteed, and they are preferred targets for ransom in hard currency", "They are not needed", "The weather is bad"], correct: "Their personal safety cannot be guaranteed, and they are preferred targets for ransom in hard currency" },
        { text: "Traveling by road in Nigeria has become a high-risk venture because:", options: ["The roads are too good", "The propensity of being kidnapped enroute is 95% and above", "There are no vehicles", "The government banned travel"], correct: "The propensity of being kidnapped enroute is 95% and above" },
        { text: "Farmers no longer go to farms for fear of:", options: ["Low prices", "Being kidnapped and having ransom requested from their loved ones", "Flooding", "Pests"], correct: "Being kidnapped and having ransom requested from their loved ones" },
        { text: "The Chibok school girls kidnapping happened in:", options: ["April 2014", "April 2015", "May 2014", "June 2014"], correct: "April 2014" },
        // Armed Banditry (31-35)
        { text: "Armed banditry refers to a set of people who take up arms and unleash terror on other citizens:", options: ["Only during wars", "Without any kind of provocation first", "Only in self-defense", "Only at night"], correct: "Without any kind of provocation first" },
        { text: "Unlike kidnapping, armed bandits do not have:", options: ["Weapons", "Any specific goal or target", "Members", "Leaders"], correct: "Any specific goal or target" },
        { text: "Armed bandits' activities are characterized by:", options: ["Peaceful protests", "Violence, destruction, bloodletting, and killing", "Negotiations", "Charity work"], correct: "Violence, destruction, bloodletting, and killing" },
        { text: "Armed bandits can also be referred to as:", options: ["Freedom fighters", "Extremists who love to terrorize those around them", "Revolutionaries", "Militia"], correct: "Extremists who love to terrorize those around them" },
        { text: "The chapter states that armed bandits do NOT have any specific goal or target that they want to achieve, which makes them:", options: ["More predictable", "Less dangerous", "More unpredictable and dangerous", "Easier to negotiate with"], correct: "More unpredictable and dangerous" },
        // Economic and Social Implications (36-40)
        { text: "Kidnapping has led to high cost of living because:", options: ["Salaries increased", "Prices of food and other necessities have skyrocketed", "Taxes were reduced", "Subsidies increased"], correct: "Prices of food and other necessities have skyrocketed" },
        { text: "Which of the following is a social implication of kidnapping mentioned in the chapter?", options: ["Increased social gatherings", "People find it very difficult to attend social gatherings as they used to", "More weddings", "Increased tourism"], correct: "People find it very difficult to attend social gatherings as they used to" },
        { text: "Nigerians now live in fear and suspicion because:", options: ["They enjoy it", "Reports reveal that kidnapping often involves inside help from family or acquaintances", "The government encourages it", "There is no crime"], correct: "Reports reveal that kidnapping often involves inside help from family or acquaintances" },
        { text: "Kidnapping is described as a very serious issue that bothers on:", options: ["Economic development only", "National security, threatening to break the country up", "Education only", "Healthcare only"], correct: "National security, threatening to break the country up" },
        { text: "The chapter mentions that pregnant women have been reported to be cut open and their growing fetus killed in the most brutal way ever, specifically in the context of:", options: ["Cult initiation", "Kidnapping and farm attacks", "Political riots", "Religious conflicts"], correct: "Kidnapping and farm attacks" }
    ];

    const total = QUESTIONS.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);
    let answerLocked = new Array(total).fill(false);
    let quizFinished = false;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / total) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = QUESTIONS[currentIndex];
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const prefixLetters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let additionalClass = '';
            if (isLocked) {
                if (opt === q.correct) additionalClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) additionalClass = 'selected-wrong';
                else additionalClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${additionalClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${prefixLetters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct! “${escapeHtml(selectedAnswer)}” is the right answer.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. You chose “${escapeHtml(selectedAnswer)}”. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === total-1);
        const nextOrSubmit = isLast ? 
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${total}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${total}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">
                ${cardsHtml}
            </div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        // Attach answer click handlers only if not locked
        if (!isLocked) {
            const cards = document.querySelectorAll('.answer-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    const chosen = card.getAttribute('data-opt-value');
                    userAnswers[currentIndex] = chosen;
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        // Navigation
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0 && !quizFinished) {
                    currentIndex--;
                    renderCurrent();
                }
            });
        }
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!answerLocked[currentIndex]) return;
                if (currentIndex < total-1 && !quizFinished) {
                    currentIndex++;
                    renderCurrent();
                }
            });
        }
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', () => {
                if (!answerLocked[currentIndex]) {
                    alert("Please answer the current question before finishing.");
                    return;
                }
                finishQuiz();
            });
        }
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < total; i++) {
            const correct = (userAnswers[i] === QUESTIONS[i].correct);
            if (correct) score++;
            details.push({
                num: i+1,
                text: QUESTIONS[i].text,
                user: userAnswers[i] || "(not answered)",
                correct: QUESTIONS[i].correct,
                isCorrect: correct
            });
        }
        const percent = Math.round((score / total) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You have a strong understanding of cultism, kidnapping, and armed banditry in Nigeria.";
        else if (percent >= 65) msg = "👍 Good! Review the history of cultism and the economic implications of kidnapping.";
        else if (percent >= 45) msg = "📘 Fair. Study the sections on the evil of cultism and the Chibok incident.";
        else msg = "📚 Re-read Chapter 4 carefully – focus on definitions, types of kidnapping, and the effects on national security.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...<\/td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}<\/td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}<\/td>
            <\/tr>`;
        }
        reviewHtml += `<\/table><\/div>`;

        const finalDisplay = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${total} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz</button>
                </div>
            </div>
        `;
        quizContainer.innerHTML = finalDisplay;
        quizFinished = true;
        const restart = document.getElementById('restartQuizBtn');
        if (restart) {
            restart.addEventListener('click', () => {
                resetQuiz();
            });
        }
    }

    function resetQuiz() {
        currentIndex = 0;
        userAnswers.fill(null);
        answerLocked.fill(false);
        quizFinished = false;
        renderCurrent();
        updateProgress();
    }

    // initial render
    renderCurrent();
    updateProgress();
</script>
</body>
</html>

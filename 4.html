<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ch.4 Quiz • Non-Obvious Options • Cultism, Kidnapping, Banditry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e3a2f 0%, #0f2b21 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: #fffef9;
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .quiz-header {
            background: #2b5e3b;
            padding: 24px 32px;
            color: white;
        }
        .quiz-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
        }
        .progress-container {
            background: #e0e7d9;
            height: 8px;
        }
        .progress-fill {
            background: #f5b042;
            height: 8px;
            width: 0%;
            transition: width 0.25s;
        }
        .quiz-content {
            padding: 40px 35px;
        }
        .question-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #4a673b;
            font-weight: 600;
        }
        .q-counter {
            background: #f0ebdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1c3e2b;
            line-height: 1.3;
            margin-bottom: 35px;
        }
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        .answer-card {
            background: white;
            border: 2px solid #e3dbc8;
            border-radius: 60px;
            padding: 16px 24px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #1f3d2c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
        }
        .answer-card:hover:not(.disabled-card) {
            background: #fff4e4;
            border-color: #f5b042;
        }
        .answer-card.selected-correct {
            background: #2b5e3b;
            border-color: #2b5e3b;
            color: white;
        }
        .answer-card.selected-wrong {
            background: #b3413a;
            border-color: #b3413a;
            color: white;
        }
        .answer-prefix {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: #f0ebdd;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #2b5e3b;
        }
        .selected-correct .answer-prefix, .selected-wrong .answer-prefix {
            background: #ffdd99;
            color: #1f452d;
        }
        .feedback-message {
            margin: 15px 0 10px;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        .feedback-correct {
            background: #e1f5e8;
            border-left: 6px solid #2b5e3b;
            color: #1f5a3a;
        }
        .feedback-wrong {
            background: #ffe6e5;
            border-left: 6px solid #b3413a;
            color: #9b2f28;
        }
        .disabled-card {
            cursor: default;
            opacity: 0.7;
        }
        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 15px;
        }
        .nav-btn {
            background: #ece3d4;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #2b5e3b;
        }
        .nav-btn.primary {
            background: #f5b042;
            color: #2d2b1a;
        }
        .nav-btn.primary:hover:not(:disabled) {
            background: #e09d2c;
        }
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-panel {
            background: #eef3e9;
            border-radius: 32px;
            padding: 28px;
            margin-top: 30px;
            display: none;
        }
        .result-panel.show {
            display: block;
        }
        .score-big {
            font-size: 2rem;
            font-weight: 800;
            color: #2b5e3b;
        }
        .review-table {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.85rem;
            background: #fffcf0;
            border-radius: 24px;
            padding: 12px;
            margin-top: 20px;
        }
        .restart-btn {
            background: #2b5e3b;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        footer {
            background: #f4efdf;
            text-align: center;
            padding: 16px;
            font-size: 0.75rem;
            color: #6a5a3a;
        }
        @media (max-width: 600px) {
            .quiz-content { padding: 28px 20px; }
            .question-text { font-size: 1.3rem; }
            .answer-card { padding: 12px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="quiz-header">
        <h1>⚠️ Chapter 4 · Cultism, Kidnapping & Banditry</h1>
        <p>40 questions • One per page • Blended options – no obvious correct answer</p>
    </div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-content" id="quizContent"></div>
    <footer>Based on Nigerian Peoples & Culture – Chapter 4</footer>
</div>

<script>
    // 40 QUESTIONS with carefully blended distractors (all options similar length and plausibility)
    const QUESTIONS = [
        { text: "A 'cult' is best described as a group whose members share a deep, partisan belief and primarily seek to:", options: ["Promote religious worship and community service", "Protect their collective interests and resist perceived threats", "Organize public debates on social issues", "Engage in open political campaigning"], correct: "Protect their collective interests and resist perceived threats" },
        { text: "Why are secret cults often described as 'secret' in the Nigerian context?", options: ["They operate exclusively during nighttime hours", "Their internal rules and daily activities are hidden from outsiders", "They never reveal their group name even to each other", "They are officially unrecognized by any government body"], correct: "Their internal rules and daily activities are hidden from outsiders" },
        { text: "Which of the following is typically required for membership in a secret cult?", options: ["A formal written application and interview process", "Completion of rigorous rituals to test commitment and loyalty", "Payment of a substantial registration and annual fee", "Nomination by a government official or community leader"], correct: "Completion of rigorous rituals to test commitment and loyalty" },
        { text: "The emergence of cultism in Nigeria can be traced to which period?", options: ["Early 1950s during the final years of British colonial rule", "Late 1960s among university students seeking protection", "Mid-1970s shortly after the end of the civil war", "Early 1980s under the military regime's student bans"], correct: "Late 1960s among university students seeking protection" },
        { text: "The original members of the first cult in Nigeria were primarily motivated by the need to:", options: ["Overthrow the existing government through organized force", "Stop perceived victimization and harassment by their lecturers", "Promote a specific religious doctrine across all campuses", "Gain complete control of student union funds and resources"], correct: "Stop perceived victimization and harassment by their lecturers" },
        { text: "Which trait was commonly associated with the founding members of early cult groups in Nigeria?", options: ["Exceptional physical strength and fighting abilities", "High academic performance and superior intelligence", "Significant wealth and influential family connections", "Strong political activism and public oratory skills"], correct: "High academic performance and superior intelligence" },
        { text: "What core values did the first Nigerian cult originally promote?", options: ["Intellectualism, foresight, and strong moral character", "Religious devotion, prayer, and spiritual discipline", "Military hierarchy, obedience, and physical training", "Economic self-sufficiency, trade, and entrepreneurship"], correct: "Intellectualism, foresight, and strong moral character" },
        { text: "What event caused cultism to shift away from its original purpose?", options: ["The government passed a law banning all student organizations", "The founding fathers graduated and left the university system", "Breakaway groups formed and corrupted the original vision", "Religious leaders publicly condemned the entire movement"], correct: "Breakaway groups formed and corrupted the original vision" },
        { text: "A common feature of modern cult rivalry in Nigeria is:", options: ["Public debates and academic competitions between groups", "Frequent violent clashes and revenge killings among factions", "Collaborative community service projects to improve image", "Legal battles fought in courts and before tribunals"], correct: "Frequent violent clashes and revenge killings among factions" },
        { text: "According to analysts, one major reason for cultism's decline into violence was:", options: ["Lack of financial support from wealthy alumni", "Admission of members without scholarly or intellectual merit", "Excessive surveillance and interference by security forces", "Influence of foreign films and violent video games"], correct: "Admission of members without scholarly or intellectual merit" },
        { text: "How do the original founders of Nigerian cults view today's cult groups?", options: ["They fully endorse them as the rightful successors", "They remain indifferent and have no opinion either way", "They argue that today's groups have betrayed the original ideals", "They have quietly rejoined to reform from within"], correct: "They argue that today's groups have betrayed the original ideals" },
        { text: "Which of the following best describes the nature of modern cults in Nigeria according to the chapter?", options: ["Social welfare organizations focused on community aid", "Anti-social kill squads that promote violence and lawlessness", "Academic discussion circles that meet for intellectual exchange", "Religious revival movements seeking spiritual awakening"], correct: "Anti-social kill squads that promote violence and lawlessness" },
        { text: "Students who join cults often find their academic performance suffers because:", options: ["Cult meetings and tasks demand more time and focus than studies", "Lecturers refuse to teach or assess them fairly", "School administrators place them on automatic probation", "They are forced to drop out within the first semester"], correct: "Cult meetings and tasks demand more time and focus than studies" },
        { text: "The general attitude of Nigerian families and society toward cult membership is:", options: ["Supportive if the cult is powerful and offers protection", "Indifferent as long as no obvious trouble occurs", "Strongly forbidden and condemned as evil and anti-social", "Encouraged for young men to build networks"], correct: "Strongly forbidden and condemned as evil and anti-social" },
        { text: "What is the primary purpose of regular meetings held by secret cults?", options: ["To plan community development and charity work", "To discuss group strategies, assign tasks, and maintain loyalty", "To conduct elaborate religious ceremonies and prayers", "To study academic materials and prepare for exams"], correct: "To discuss group strategies, assign tasks, and maintain loyalty" },
        { text: "The term 'kidnap' refers to the act of forcefully taking a person to:", options: ["A police station for questioning and possible arrest", "An undisclosed location against their will and consent", "Another country for deportation or exile", "A hospital for involuntary medical examination"], correct: "An undisclosed location against their will and consent" },
        { text: "How does kidnapping differ from a lawful arrest?", options: ["Arrest never involves any use of physical force at all", "An arrest can be forceful but still legal under state laws", "Kidnapping is always committed by complete strangers", "Kidnapping only affects minors and women victims"], correct: "An arrest can be forceful but still legal under state laws" },
        { text: "What term is used for individuals who commit kidnapping?", options: ["Detainees held in custody without trial", "Kidnappers who seize victims for various motives", "Extortionists who demand money under threat", "Captors who hold prisoners of war"], correct: "Kidnappers who seize victims for various motives" },
        { text: "The most frequently occurring type of kidnapping in Nigeria is:", options: ["Kidnapping for political statements and media attention", "Kidnapping for ritual purposes and traditional sacrifices", "Kidnapping for ransom to obtain money from relatives", "Kidnapping for forced marriage or domestic servitude"], correct: "Kidnapping for ransom to obtain money from relatives" },
        { text: "In ransom kidnappings, victims are typically released only after:", options: ["Police intervention through a tactical rescue operation", "A negotiated payment is made by relatives or associates", "A court order is obtained from a high court judge", "The victim manages to escape or overpower the captors"], correct: "A negotiated payment is made by relatives or associates" },
        { text: "Which of the following is cited as a cause of death for kidnap victims in captivity?", options: ["Natural aging and pre-existing chronic illness", "Inability to keep up with captors or lack of medical care", "Execution by the state for alleged criminal activity", "Starvation due to general food shortage in the region"], correct: "Inability to keep up with captors or lack of medical care" },
        { text: "Investigations reveal that most kidnapping rings in Nigeria are:", options: ["Lone individuals acting without any coordination", "Well-organized syndicates with wide networks of informants", "Spontaneous groups formed temporarily on social media", "Government agents working undercover to entrap citizens"], correct: "Well-organized syndicates with wide networks of informants" },
        { text: "The chapter suggests that even local artisans may sometimes participate in kidnapping as:", options: ["Unwilling victims who are forced to cooperate", "Informants or part of the criminal network", "Negotiators between families and captors", "Undercover police officers gathering evidence"], correct: "Informants or part of the criminal network" },
        { text: "Kidnapping for ritual purposes, political reasons, or media attention falls under the category of:", options: ["Kidnapping for ransom as the primary motive", "Kidnapping for other non-ransom motives", "Justifiable abduction in rare circumstances", "State-sanctioned detention for national security"], correct: "Kidnapping for other non-ransom motives" },
        { text: "According to the chapter, what drives the extreme brutality of some kidnappers?", options: ["Untreated mental illness and personality disorders", "Desire to instill maximum fear and demonstrate ruthlessness", "Revenge against society for past personal grievances", "Lack of formal education and economic opportunities"], correct: "Desire to instill maximum fear and demonstrate ruthlessness" },
        { text: "Why have many foreign investors left Nigeria according to the chapter?", options: ["High corporate taxes and poor transportation infrastructure", "Inability to guarantee personal safety and fear of being targeted", "Lack of skilled labour and unreliable power supply", "Unfavourable exchange rates and currency devaluation"], correct: "Inability to guarantee personal safety and fear of being targeted" },
        { text: "Road travel in Nigeria is described as high-risk because:", options: ["There are no road signs or traffic regulations", "The chance of being kidnapped on the road is extremely high", "Vehicles are poorly maintained and frequently break down", "Drivers are largely untrained and unlicensed"], correct: "The chance of being kidnapped on the road is extremely high" },
        { text: "Why are many Nigerian farmers abandoning their farms?", options: ["Low crop prices and lack of storage facilities", "Fear of being kidnapped and having ransom demanded", "Lack of fertile land due to desertification and erosion", "Government seizure of land for urban development"], correct: "Fear of being kidnapped and having ransom demanded" },
        { text: "The abduction of the Chibok schoolgirls occurred in which year?", options: ["2012", "2013", "2014", "2015"], correct: "2014" },
        { text: "Armed banditry is characterized by attacks on citizens:", options: ["Only during declared wars or states of emergency", "Without any prior provocation or specific grievance", "Only in self-defence after being attacked first", "Only at night under cover of darkness"], correct: "Without any prior provocation or specific grievance" },
        { text: "A key difference between armed bandits and kidnappers is that bandits often:", options: ["Have clear political demands and manifestos", "Do not have any specific goal or target", "Release victims without any payment or condition", "Operate only in rural areas and avoid cities"], correct: "Do not have any specific goal or target" },
        { text: "The activities of armed bandits typically involve:", options: ["Peaceful protests and sit-ins at government buildings", "Violence, destruction, and indiscriminate killings", "Negotiations with community leaders and elders", "Charitable distributions to gain local support"], correct: "Violence, destruction, and indiscriminate killings" },
        { text: "Armed bandits are often described as:", options: ["Freedom fighters resisting oppressive rule", "Extremists who terrorize communities randomly", "Disgruntled workers protesting unemployment", "Political dissidents seeking regime change"], correct: "Extremists who terrorize communities randomly" },
        { text: "Because armed bandits lack a specific target or goal, they are considered:", options: ["Less dangerous than organized kidnapping rings", "Easier to negotiate with using local elders", "More unpredictable and dangerous to civilians", "More likely to surrender when confronted"], correct: "More unpredictable and dangerous to civilians" },
        { text: "One economic consequence of kidnapping mentioned is:", options: ["Lower inflation due to reduced consumer spending", "Higher cost of living because food prices skyrocket", "Increased agricultural output from abandoned farms", "Reduced unemployment as people join vigilante groups"], correct: "Higher cost of living because food prices skyrocket" },
        { text: "Which social effect of kidnapping is highlighted in the chapter?", options: ["Increased attendance at parties and social events", "Reluctance to attend social gatherings even when invited", "More community festivals to boost local morale", "Higher tourism rates as people seek adventure"], correct: "Reluctance to attend social gatherings even when invited" },
        { text: "Why do Nigerians now live with heightened fear and suspicion?", options: ["There is no functioning police force anywhere", "Kidnappings often involve inside help from acquaintances", "The media deliberately exaggerates every crime", "The government encourages citizens to spy on each other"], correct: "Kidnappings often involve inside help from acquaintances" },
        { text: "The chapter describes kidnapping as a threat to:", options: ["Only the economy and business environment", "Only the education system and schools", "National security, potentially destabilizing the country", "Only healthcare and hospital services"], correct: "National security, potentially destabilizing the country" },
        { text: "Brutal acts such as pregnant women being cut open on farms are cited in the context of:", options: ["Cult initiation ceremonies and oath-taking rituals", "Kidnapping and farm attacks by bandits", "Political riots during election periods", "Religious conflicts between faith groups"], correct: "Kidnapping and farm attacks by bandits" }
    ];

    const total = QUESTIONS.length;
    let currentIndex = 0;
    let userAnswers = new Array(total).fill(null);
    let answerLocked = new Array(total).fill(false);
    let quizFinished = false;

    const quizContainer = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / total) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCurrent() {
        if (quizFinished) return;
        const q = QUESTIONS[currentIndex];
        const isLocked = answerLocked[currentIndex];
        const selectedAnswer = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D'];

        let cardsHtml = '';
        q.options.forEach((opt, idx) => {
            let addClass = '';
            if (isLocked) {
                if (opt === q.correct) addClass = 'selected-correct';
                else if (opt === selectedAnswer && opt !== q.correct) addClass = 'selected-wrong';
                else addClass = 'disabled-card';
            }
            cardsHtml += `
                <div class="answer-card ${addClass}" data-opt-value="${escapeHtml(opt)}">
                    <span class="answer-prefix">${letters[idx]}</span>
                    <span>${escapeHtml(opt)}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isLocked) {
            const wasCorrect = (selectedAnswer === q.correct);
            if (wasCorrect) {
                feedbackHtml = `<div class="feedback-message feedback-correct">✅ Correct. “${escapeHtml(selectedAnswer)}” is right.</div>`;
            } else {
                feedbackHtml = `<div class="feedback-message feedback-wrong">❌ Wrong. You chose “${escapeHtml(selectedAnswer)}”. The correct answer is: <strong>${escapeHtml(q.correct)}</strong>.</div>`;
            }
        }

        const nextDisabled = !isLocked;
        const isLast = (currentIndex === total-1);
        const nextOrSubmit = isLast ?
            `<button class="nav-btn primary" id="submitFinalBtn" ${nextDisabled ? 'disabled' : ''}>✔ FINISH & SHOW SCORE</button>` :
            `<button class="nav-btn primary" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>Next ▶</button>`;

        const html = `
            <div class="question-meta">
                <span class="q-counter">Question ${currentIndex+1} of ${total}</span>
                <span>✅ answered: ${userAnswers.filter(a=>a!==null).length} / ${total}</span>
            </div>
            <div class="question-text">${escapeHtml(q.text)}</div>
            <div class="answers-grid" id="answersGrid">${cardsHtml}</div>
            ${feedbackHtml}
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                ${nextOrSubmit}
            </div>
        `;
        quizContainer.innerHTML = html;

        if (!isLocked) {
            document.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (answerLocked[currentIndex]) return;
                    userAnswers[currentIndex] = card.getAttribute('data-opt-value');
                    answerLocked[currentIndex] = true;
                    renderCurrent();
                    updateProgress();
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) prevBtn.onclick = () => { if (currentIndex > 0 && !quizFinished) { currentIndex--; renderCurrent(); } };
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.onclick = () => { if (answerLocked[currentIndex] && currentIndex < total-1 && !quizFinished) { currentIndex++; renderCurrent(); } };
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) submitBtn.onclick = () => { if (answerLocked[currentIndex]) finishQuiz(); else alert("Please answer first."); };
    }

    function finishQuiz() {
        let score = 0;
        let details = [];
        for (let i = 0; i < total; i++) {
            const correct = (userAnswers[i] === QUESTIONS[i].correct);
            if (correct) score++;
            details.push({ num: i+1, text: QUESTIONS[i].text, user: userAnswers[i] || "(no answer)", correct: QUESTIONS[i].correct, isCorrect: correct });
        }
        const percent = Math.round((score / total) * 100);
        let msg = "";
        if (percent >= 85) msg = "🏆 Excellent! You really know the material.";
        else if (percent >= 65) msg = "👍 Good. Review the history of cultism and economic impacts.";
        else if (percent >= 45) msg = "📘 Fair. Study the sections on kidnapping types and the Chibok incident.";
        else msg = "📚 Re-read Chapter 4 carefully – definitions and social implications are key.";

        let reviewHtml = `<div style="max-height:360px; overflow-y:auto;"><table style="width:100%; border-collapse:collapse;">`;
        for (let d of details) {
            const sym = d.isCorrect ? "✅" : "❌";
            reviewHtml += `<tr style="border-bottom:1px solid #ddd;">
                <td style="padding:6px;">${sym} <strong>Q${d.num}</strong></td>
                <td style="padding:6px;">${escapeHtml(d.text.substring(0,80))}...</td>
                <td style="padding:6px; color:${d.isCorrect ? '#1f6d39' : '#b33'}">${escapeHtml(d.user)}</td>
                <td style="padding:6px; color:#2b5e3b;">✓ ${escapeHtml(d.correct)}</td>
            </tr>`;
        }
        reviewHtml += `</table></div>`;

        quizContainer.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <div class="result-panel show" style="display:block;">
                    <div class="score-big">🎯 ${score} / ${total} (${percent}%)</div>
                    <div>${msg}</div>
                    <div class="review-table">${reviewHtml}</div>
                    <button class="restart-btn" id="restartQuizBtn">⟳ Restart Quiz</button>
                </div>
            </div>
        `;
        quizFinished = true;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            currentIndex = 0;
            userAnswers.fill(null);
            answerLocked.fill(false);
            quizFinished = false;
            renderCurrent();
            updateProgress();
        });
    }

    renderCurrent();
    updateProgress();
</script>
</body>
</html>
